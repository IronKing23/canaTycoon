const rand = (a, b) => a + Math.random() * (b - a);

const escolha = arr => arr[(Math.random() * arr.length) | 0];

const $ = n => '$' + Math.floor(n);
const hhmm = m => String((m / 60) | 0).padStart(2, '0') + ':' + String((m | 0) % 60).padStart(2, '0');

function sorteioPesado(lista) {                 // lista de [..., peso em i=2]
  const total = lista.reduce((s, o) => s + o[2], 0);
  let r = Math.random() * total;
  for (const o of lista) { r -= o[2]; if (r <= 0) return o; }
  return lista[0];
}

/* ═══════════════════════════ DUELO: semente + códigos ══════════════
   Para os dois jogarem a MESMA safra, o setup do mundo e o sorteio de
   cada dia usam um gerador determinístico (mulberry32). A jogabilidade
   momento-a-momento continua no Math.random real. */
let _semRng = null;                              // gerador semeado persistente
function fazerRng(seed) {
  let a = (seed >>> 0) || 1;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function comSemente(fn) {                         // roda fn com o RNG semeado
  if (!_semRng) return fn();
  const real = Math.random;
  Math.random = _semRng;
  try { return fn(); } finally { Math.random = real; }
}
function fazerCodigo(o) {
  const json = JSON.stringify(o);
  try { return 'CANA1' + btoa(unescape(encodeURIComponent(json))); }
  catch (e) { return 'CANA1' + btoa(json); }
}
function lerCodigo(str) {
  if (!str) return null;
  const m = String(str).match(/CANA1([A-Za-z0-9+/=]+)/);
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(m[1])))); }
  catch (e) { try { return JSON.parse(atob(m[1])); } catch (e2) { return null; } }
}

<script>
'use strict';
/* ════════════════════════════════════════ som 8-bit sintetizado ═════
   Nada de arquivos: motor e chuva são nós persistentes; efeitos são
   osciladores/ruídos descartáveis com envelope. Destrava no 1º gesto. */
let mudo = localStorage.getItem(CFG.CHAVE_MUDO) === '1';
const AU = { ctx: null, master: null, motor: null, chuva: null };

function auInit() {
  if (AU.ctx) { if (AU.ctx.resume) AU.ctx.resume(); return; }
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  AU.ctx = new AC();
  AU.master = AU.ctx.createGain();
  AU.master.gain.value = mudo ? 0 : 0.6;
  AU.master.connect(AU.ctx.destination);

  const o = AU.ctx.createOscillator();                    // ronco do motor
  o.type = 'sawtooth'; o.frequency.value = 50;
  const f = AU.ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 340;
  const g = AU.ctx.createGain(); g.gain.value = 0;
  o.connect(f); f.connect(g); g.connect(AU.master); o.start();
  AU.motor = { o, g };

  const n = (AU.ctx.sampleRate * 1.5) | 0;                // chuva (ruído em loop)
  const buf = AU.ctx.createBuffer(1, n, AU.ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const s = AU.ctx.createBufferSource(); s.buffer = buf; s.loop = true;
  const fc = AU.ctx.createBiquadFilter(); fc.type = 'lowpass'; fc.frequency.value = 900;
  const gc = AU.ctx.createGain(); gc.gain.value = 0;
  s.connect(fc); fc.connect(gc); gc.connect(AU.master); s.start();
  AU.chuva = gc;
}

function motorSom(vel, ligado) {
  if (!AU.motor) return;
  const alvo = ligado ? 0.05 + (vel / 500) * 0.06 + (jog.turbo > 0 ? 0.05 : 0) : 0;
  AU.motor.g.gain.value += (alvo - AU.motor.g.gain.value) * 0.15;
  AU.motor.o.frequency.value = 42 + vel * 0.16 + (jog.turbo > 0 ? 38 : 0);
}
function chuvaSom(on) {
  if (AU.chuva) AU.chuva.gain.value += ((on ? 0.14 : 0) - AU.chuva.gain.value) * 0.05;
}

function beep(f0, f1, dur, tipo, vol, quando = 0) {
  if (!AU.ctx || mudo) return;
  const t = AU.ctx.currentTime + quando;
  const o = AU.ctx.createOscillator();
  o.type = tipo;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.linearRampToValueAtTime(f1, t + dur);
  const g = AU.ctx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.linearRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(AU.master);
  o.start(t); o.stop(t + dur + 0.02);
}
function ruido(dur, vol, freq = 1200, quando = 0) {
  if (!AU.ctx || mudo) return;
  const t = AU.ctx.currentTime + quando;
  const n = (AU.ctx.sampleRate * dur) | 0;
  const buf = AU.ctx.createBuffer(1, n, AU.ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const s = AU.ctx.createBufferSource(); s.buffer = buf;
  const f = AU.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq;
  const g = AU.ctx.createGain(); g.gain.value = vol;
  s.connect(f); f.connect(g); g.connect(AU.master);
  s.start(t);
}

const SFX = {
  corte()   { ruido(0.06, 0.25, 2600); beep(220, 120, 0.05, 'square', 0.10); },
  moeda()   { beep(880, 880, 0.06, 'square', 0.16); beep(1318, 1318, 0.09, 'square', 0.16, 0.06); },
  vendona() { SFX.moeda(); beep(1760, 1760, 0.12, 'square', 0.14, 0.14); },
  colisao() { ruido(0.18, 0.5, 700); beep(90, 50, 0.16, 'triangle', 0.3); },
  multa()   { beep(180, 140, 0.28, 'sawtooth', 0.22); beep(150, 110, 0.28, 'sawtooth', 0.18, 0.3); },
  raio()    { ruido(0.5, 0.7, 3000); beep(60, 35, 0.4, 'sawtooth', 0.25); },
  fogo()    { ruido(0.08, 0.12, 1800); },
  turbo()   { beep(180, 720, 0.5, 'sawtooth', 0.2); beep(360, 1440, 0.5, 'square', 0.12); },
  plantar() { beep(340, 520, 0.08, 'sine', 0.2); },
  alarme()  { beep(880, 880, 0.09, 'square', 0.2); beep(880, 880, 0.09, 'square', 0.2, 0.14); },
  reparo()  { ruido(0.05, 0.2, 3200); beep(500, 500, 0.05, 'square', 0.1, 0.06); ruido(0.05, 0.2, 3200, 0.12); },
  peca()    { beep(1040, 1040, 0.06, 'square', 0.14); beep(1560, 1560, 0.08, 'square', 0.12, 0.07); },
  spray()   { ruido(0.28, 0.22, 5200); ruido(0.18, 0.15, 6400, 0.1); },
  praga()   { for (let i = 0; i < 5; i++) beep(720 - i * 90, 640 - i * 90, 0.05, 'square', 0.12, i * 0.06);

<script>

/* ═══════════════════════════════ sprites 16-bits (pré-renderizados) ═ */

    cc.beginPath(); cc.moveTo(23 * S, 1.5 * S); cc.lineTo(27.6 * S, 4.5 * S); cc.lineTo(23 * S, 7 * S); cc.fill();

  /* touceiras de cana vistas de cima (variações) */

    const claras  = prem ? ['#e3b81e', '#ffd94d', '#c79b08'] : ['#4f9b3a', '#63b34a', '#3a7d2c'];
    for (let p = 0; p < 2; p++) {                    // camada escura embaixo, clara em cima
      const cores = p ? claras : escuras, n = p ? 8 : 7, base = p ? 8 : 10;
      for (let i = 0; i < n; i++) {
        const a = seed * (p + 1) + i * (Math.PI * 2 / n) + Math.sin(seed + i) * 0.3;
        const L = base + ((seed * 13 + i * 7) % 4) - (p ? 0 : 1);

  SPR.cana = [canaSpr(false, 1), canaSpr(false, 2.4), canaSpr(false, 4.1)];
  SPR.canaPrem = [canaSpr(true, 1.7), canaSpr(true, 3.3)];

  { const [c, cc] = offscreen(12, 12);                                   // broto
    cc.strokeStyle = '#7cc85a'; cc.lineWidth = 2;
    for (const a of [-2.2, -1.57, -0.9]) {

  SPR.pedra = [0, 1, 2].map(v => {                                       // pedras
    const r = 9 + v * 3;

    cc.fillStyle = '#6e7278'; cc.beginPath(); cc.ellipse(r + 2, r, r + 1, r * 0.72, 0, 0, 7); cc.fill();
    cc.fillStyle = '#8b9096'; cc.beginPath(); cc.ellipse(r, r * 0.8, r * 0.6, r * 0.4, 0, 0, 7); cc.fill();
    return c;

  /* capivara: 2 quadros andando + dormindo */
  function capiSpr(fr) {
    const [c, cc] = offscreen(30, 18);
    cc.fillStyle = '#241708';                                            // contorno
    cc.beginPath(); cc.ellipse(15, 9, 13.2, 7.6, 0, 0, 7); cc.fill();
    cc.beginPath(); cc.ellipse(25.4, 8, 6.2, 5.4, 0, 0, 7); cc.fill();
    if (fr < 2) {
      cc.fillStyle = '#4a3320';
      cc.fillRect(7 + fr * 2, 13, 3, 4); cc.fillRect(13 - fr * 2, 13, 3, 4);
      cc.fillRect(19 + fr * 2, 13, 3, 4); cc.fillRect(24 - fr * 2, 13, 3, 4);
    }
    cc.fillStyle = '#7a5a36'; cc.beginPath(); cc.ellipse(15, 9, 12, 6.5, 0, 0, 7); cc.fill();
    cc.fillStyle = '#8d6b42'; cc.beginPath(); cc.ellipse(13, 7.5, 9, 4.5, 0, 0, 7); cc.fill();
    cc.fillStyle = '#6b4d2c'; cc.beginPath(); cc.ellipse(25, 8, 5, 4.4, 0, 0, 7); cc.fill();
    cc.fillStyle = '#4a3320'; cc.fillRect(28, 7, 2, 3);
    cc.fillRect(23, 4, 2, 2); cc.fillRect(26, 4, 2, 2);
    if (fr === 2) { cc.fillStyle = '#2a1d10'; cc.fillRect(24, 7, 3, 1); }
    else { cc.fillStyle = '#1c130a'; cc.fillRect(26, 7, 2, 2); }
    return c;
  }
  SPR.capi = [capiSpr(0), capiSpr(1)];
  SPR.capiDorme = capiSpr(2);

  SPR.arvore = [0, 1, 2].map(v => {                                      // copas de árvore
    const r = 20 + v * 5;
    const [c, cc] = offscreen(r * 2 + 6, r * 2 + 6);
    const cx = r + 3, cy = r + 3;
    cc.fillStyle = '#16300e'; cc.beginPath(); cc.arc(cx, cy, r, 0, 7); cc.fill();
    cc.fillStyle = '#2c5220'; cc.beginPath(); cc.arc(cx - r * .14, cy - r * .14, r * .84, 0, 7); cc.fill();
    cc.fillStyle = '#3d6b2a'; cc.beginPath(); cc.arc(cx - r * .26, cy - r * .26, r * .56, 0, 7); cc.fill();
    for (let i = 0; i < 16; i++) {
      const a = rand(0, 6.28), rr = rand(r * .2, r * .88);
      cc.fillStyle = Math.random() < .5 ? '#4d7f36' : '#122a0b';
      cc.fillRect(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, 3, 3);
    }
    return c;
  });

  { const [c, cc] = offscreen(18, 18);                                   // caixa de peças ⚙
    cc.fillStyle = '#caa02a';
    for (let i = 0; i < 8; i++) {
      const a = i * Math.PI / 4;
      cc.fillRect(9 + Math.cos(a) * 7 - 2, 9 + Math.sin(a) * 7 - 2, 4, 4);
    }
    cc.beginPath(); cc.arc(9, 9, 6, 0, 7); cc.fill();
    cc.fillStyle = '#8a6b10'; cc.beginPath(); cc.arc(9, 9, 4.4, 0, 7); cc.fill();
    cc.fillStyle = '#caa02a'; cc.beginPath(); cc.arc(9, 9, 3, 0, 7); cc.fill();
    cc.fillStyle = '#5b4408'; cc.beginPath(); cc.arc(9, 9, 1.6, 0, 7); cc.fill();
    cc.fillStyle = '#ffe89a'; cc.fillRect(6, 5, 2, 2);

  /* usina (prédio inteiro num sprite só) */
  { const [c, cc] = offscreen(USINA.w, USINA.h);
    cc.fillStyle = '#7d8188'; cc.fillRect(0, 118, USINA.w, 50);              // pátio
    cc.fillStyle = '#6b6f76'; cc.fillRect(0, 118, USINA.w, 4);

    cc.fillStyle = '#d8dde2'; cc.fillRect(15, 0, 28, 6);
    cc.fillStyle = '#8f959c'; cc.fillRect(52, 46, 128, 76);                  // galpão

    cc.moveTo(46, 50); cc.lineTo(116, 18); cc.lineTo(186, 50); cc.fill();
    cc.fillStyle = '#5d6772'; for (let x = 56; x < 180; x += 14) cc.fillRect(x, 30, 3, 20);

/* ═══════════════════════════════ avatares dos mecânicos (retratos) ═ */
const AVA = [];
function fazerAvatares() {
  // paleta por índice de CFG.MECANICOS:
  // 0 LEGAL · 1 GELADO · 2 ZÉ DA ANTA · 3 GORDUROSO · 4 PRATEADO
  // 5 PORQUINHO · 6 MERCANTE DE AZUL · 7 EU SOU É TÉCNICO
  const S = 3, N = 16;
  const pele   = ['#e0a878','#cdb7c0','#c98a5a','#d69a68','#e6b98c','#f0c0a0','#c9975f','#d8a878'];
  const cabelo = ['#5a3a1e','#8fd6e8','#3a2a18','#2a1c10','#c9c9c9','#e8a0b0','#3a2c1a','#4a3420'];
  const macac  = ['#3f7d3a','#2f6d8f','#7a5a2a','#5a4a3a','#8a8a92','#c98ab0','#2a4a9a','#3a5a4a'];
  for (let i = 0; i < 8; i++) {
    const [c, cc] = offscreen(N * S, N * S);
    const P = (x, y, w, h, cor) => { cc.fillStyle = cor; cc.fillRect(x*S, y*S, w*S, h*S); };
    P(0, 0, N, N, '#12180d');                                  // fundo
    P(1, 1, N-2, N-2, ['#243a52','#2e4a6a','#3a2e1a','#2a2418','#3a3e44','#4a2a44','#1e356a','#243a44'][i]);
    // ombros / macacão
    P(2, 13, 12, 3, macac[i]); P(2, 15, 12, 1, '#10160c');
    P(6, 13, 4, 2, '#20301c');                                 // gola
    // rosto
    P(4, 4, 8, 9, pele[i]); P(4, 4, 8, 1, '#00000022');
    P(3, 6, 1, 4, pele[i]); P(12, 6, 1, 4, pele[i]);           // orelhas
    // cabelo (estilos diferentes)
    if (i === 3 || i === 5) { P(4, 3, 8, 2, cabelo[i]); }      // careca/baixo
    else if (i === 7) { P(4, 2, 8, 3, cabelo[i]); P(3, 3, 1, 3, cabelo[i]); P(12, 3, 1, 3, cabelo[i]); }
    else { P(4, 2, 8, 3, cabelo[i]); P(3, 3, 1, 4, cabelo[i]); P(12, 3, 1, 4, cabelo[i]); P(4, 4, 2, 1, cabelo[i]); }
    // olhos
    P(6, 7, 1, 2, '#1a1a1a'); P(9, 7, 1, 2, '#1a1a1a');
    // detalhes por personagem
    if (i === 1) { P(4, 4, 8, 2, 'rgba(140,214,232,.35)'); }   // GELADO: tez fria
    if (i === 2) { P(6, 11, 4, 2, '#3a2a18'); P(6, 10, 4, 1, '#4a3420'); } // ZÉ: bigodão
    if (i === 3) { P(5, 10, 6, 3, '#2a1c10'); P(5, 12, 6, 1, '#1a120a'); P(7, 9, 2, 1, '#3a2a18'); } // GORDUROSO: barba
    if (i === 4) { P(3, 3, 10, 1, '#e8e8e8'); P(4, 4, 8, 1, 'rgba(255,255,255,.25)'); } // PRATEADO: brilho
    if (i === 5) { P(6, 10, 4, 2, '#e0a0a0'); P(6, 9, 1, 1, '#1a1a1a'); P(9, 9, 1, 1, '#1a1a1a'); } // PORQUINHO: focinho
    if (i === 6) { P(5, 1, 6, 2, '#1e356a'); P(4, 2, 8, 1, '#2a4a9a'); P(6, 12, 4, 1, '#f0c814'); } // MERCANTE: boné+gravata
    if (i === 7) { P(5, 6, 3, 3, 'rgba(180,220,255,.5)'); P(8, 6, 3, 3, 'rgba(180,220,255,.5)'); // óculos
                   P(5, 7, 6, 1, '#1a1a1a'); P(7, 7, 2, 1, '#1a1a1a');
                   P(10, 13, 2, 2, '#f0c814'); }               // crachá
    // capacete de segurança para 0 e 4
    if (i === 0 || i === 4) { P(4, 1, 8, 2, '#f0c814'); P(3, 2, 10, 1, '#c79f08'); P(7, 1, 2, 1, '#fff3b0'); }
    // boca neutra
    P(7, 11, 2, 1, '#7a4a3a');
    AVA.push(c);
  }
}

/* ══════════════════════════════════════════ chão do mapa (1x) ═════ */
let CHAO = null;
function fazerChao() {
  const [c, cc] = offscreen(MW, MH);
  cc.fillStyle = '#7d9450'; cc.fillRect(0, 0, MW, MH);              // pasto-base
  for (let i = 0; i < 5200; i++) {                                  // mosqueado fino
    cc.fillStyle = escolha(['rgba(96,116,56,.5)', 'rgba(140,160,92,.5)', 'rgba(70,88,40,.4)']);
    cc.fillRect(rand(0, MW) | 0, rand(0, MH) | 0, randi(2, 3), 2);
  }
  for (let i = 0; i < 26; i++) {                                    // variação orgânica larga
    cc.fillStyle = 'rgba(60,78,34,.07)';
    cc.beginPath(); cc.ellipse(rand(0, MW), rand(0, MH), rand(120, 320), rand(80, 200), rand(0, 3), 0, 7);
    cc.fill();
  }
  for (const [px, py] of PLOTS) {                                   // talhões de solo arado
    const w = 332, h = 224, x0 = px - 16, y0 = py - 18;
    cc.fillStyle = '#4d422a'; cc.fillRect(x0 - 3, y0 - 3, w + 6, h + 6);
    cc.fillStyle = '#6f5f38'; cc.fillRect(x0, y0, w, h);
    for (let cx2 = x0 + 6; cx2 < x0 + w; cx2 += 26) {               // sulcos casando com as fileiras
      cc.fillStyle = '#5c4e2e'; cc.fillRect(cx2, y0 + 3, 12, h - 6);
      cc.fillStyle = '#7d6c42'; cc.fillRect(cx2 + 12, y0 + 3, 3, h - 6);
    }
    for (let i = 0; i < 130; i++) {
      cc.fillStyle = escolha(['rgba(212,196,120,.55)', 'rgba(70,58,34,.6)']);
      cc.fillRect(x0 + rand(4, w - 6), y0 + rand(4, h - 6), 2, 2);
    }
  }
  for (let i = 0; i < 180; i++) {                                   // flores silvestres
    const x = rand(40, MW - 40), y = rand(40, MH - 40);
    cc.fillStyle = escolha(['#e88bb0', '#f2f2f2', '#ffd94d', '#c98be8']);
    cc.fillRect(x - 1, y - 3, 2, 2); cc.fillRect(x - 1, y + 1, 2, 2);
    cc.fillRect(x - 3, y - 1, 2, 2); cc.fillRect(x + 1, y - 1, 2, 2);
    cc.fillStyle = '#f7f0c0'; cc.fillRect(x - 1, y - 1, 2, 2);
  }
  for (let i = 0; i < 300; i++) {                                   // tufos de capim
    const x = rand(30, MW - 30), y = rand(30, MH - 30);
    cc.strokeStyle = escolha(['#5f7d3a', '#6c8c44']); cc.lineWidth = 1.5;
    cc.beginPath(); cc.moveTo(x, y); cc.lineTo(x + rand(-3, 3), y - rand(4, 8)); cc.stroke();
  }
  for (let i = 0; i < 110; i++) {                                   // pedrisco
    cc.fillStyle = 'rgba(122,126,132,.55)';
    cc.fillRect(rand(0, MW) | 0, rand(0, MH) | 0, 3, 2);
  }
  const alvoX = USINA.zona.x + USINA.zona.w / 2, alvoY = USINA.zona.y + 40; // estrada
  const passos = 96;
  for (let i = 0; i <= passos; i++) {
    const t = i / passos;
    const x = lerp(MW / 2, alvoX, t) + Math.sin(t * 5.5) * 60;
    const y = lerp(MH / 2 + 140, alvoY, t);
    cc.fillStyle = '#5c4a2c'; cc.beginPath(); cc.arc(x, y, 28, 0, 7); cc.fill();
    cc.fillStyle = '#8a6b43'; cc.beginPath(); cc.arc(x, y, 23, 0, 7); cc.fill();
    cc.fillStyle = '#79603c'; cc.beginPath(); cc.arc(x, y - 1, 15, 0, 7); cc.fill();
    if (i % 3 === 0) {                                               // trilhos de pneu
      cc.fillStyle = 'rgba(70,56,32,.8)';
      cc.fillRect(x - 12, y - 2, 5, 4); cc.fillRect(x + 7, y - 2, 5, 4);
    }
  }
  for (const L of LAGOAS) {                                          // lagoas
    cc.fillStyle = '#c7b083';
    cc.beginPath(); cc.ellipse(L.x, L.y, L.rx + 12, L.ry + 9, 0, 0, 7); cc.fill();
    cc.fillStyle = '#27515f';
    cc.beginPath(); cc.ellipse(L.x, L.y, L.rx, L.ry, 0, 0, 7); cc.fill();
    cc.fillStyle = '#356b7c';
    cc.beginPath(); cc.ellipse(L.x, L.y - 4, L.rx * .86, L.ry * .8, 0, 0, 7); cc.fill();
    cc.fillStyle = '#4b8b9c';
    cc.beginPath(); cc.ellipse(L.x - L.rx * .2, L.y - L.ry * .25, L.rx * .5, L.ry * .4, 0, 0, 7); cc.fill();
    cc.strokeStyle = '#2c5220'; cc.lineWidth = 2;                    // juncos na margem
    for (let i = 0; i < 12; i++) {
      const a = rand(0, 6.28);
      const bx = L.x + Math.cos(a) * (L.rx + 6), by = L.y + Math.sin(a) * (L.ry + 5);
      cc.beginPath(); cc.moveTo(bx, by); cc.lineTo(bx + rand(-2, 2), by - rand(6, 11)); cc.stroke();
    }

/* ═══════════════════ grade espacial (colisão só com o que é perto) ═ */
const CEL = 96, GW_ = Math.ceil(MW / CEL), GH_ = Math.ceil(MH / CEL);
const grade = Array.from({ length: GW_ * GH_ }, () => []);
const gIdx = (x, y) => clamp((y / CEL) | 0, 0, GH_ - 1) * GW_ + clamp((x / CEL) | 0, 0, GW_ - 1);
function gAdd(c) { c.gi = gIdx(c.x, c.y); grade[c.gi].push(c); }
function gDel(c) { const a = grade[c.gi], k = a.indexOf(c); if (k >= 0) a.splice(k, 1); }
function gLimpar() { for (const a of grade) a.length = 0; }
function gPerto(x, y, r, cb) {                    // varre só as células vizinhas
  const x0 = clamp(((x - r) / CEL) | 0, 0, GW_ - 1), x1 = clamp(((x + r) / CEL) | 0, 0, GW_ - 1);
  const y0 = clamp(((y - r) / CEL) | 0, 0, GH_ - 1), y1 = clamp(((y + r) / CEL) | 0, 0, GH_ - 1);
  for (let cy = y0; cy <= y1; cy++)
    for (let cx = x0; cx <= x1; cx++) {
      const cel = grade[cy * GW_ + cx];
      for (let i = cel.length - 1; i >= 0; i--) cb(cel[i]);
    }
}

  if (x < 50 || y < 50 || x > MW - 50 || y > MH - 50) return false;

    toast('🌟 TODAS AS TAREFAS DO DIA CUMPRIDAS! Bônus extra +' + $(extra) + '!', 4);
    SFX.recorde(); setTimeout(() => SFX.recorde(), 260);
  }
}
function progContrato(id, n = 1) {
  for (const c of listaContratos()) {
    if (c.feito || c.falhou || c.id !== id) continue;
    c.prog += n;
    if (c.prog >= c.alvo) { c.prog = c.alvo; contratoFeito(c); }
  }
}
function progContratoValor(id, valor) {          // metas de "atingir X" (ex.: combo)
  for (const c of listaContratos()) {
    if (c.feito || c.falhou || c.id !== id) continue;
    c.prog = Math.max(c.prog, valor);
    if (c.prog >= c.valorAlvo) { c.prog = c.valorAlvo; contratoFeito(c); }
  }
}

function iniciarJogo() {

    _semRng = fazerRng(G.duelo.semente);
  } else _semRng = null;
  G.dia = 1; G.grana = CFG.GRANA_INICIAL; G.picoGrana = CFG.GRANA_INICIAL; G.novoRec = false;
  G.stats = { ganho: 0, gasto: 0, minTrab: 0, cortes: 0, prem: 0, capis: 0,
              investido: 0, retirado: 0, mecanicos: 0 };
  G.atrasoProxDia = 0; G.reforma = null;
  jog.comp = { hidraulico: 100, rodante: 100, corte: 100, motor: 100 };
  nivel.motor = nivel.esteiras = nivel.cacamba = nivel.tanque = 0;
  jog.x = MW / 2; jog.y = MH / 2 + 120; jog.ang = -Math.PI / 2; jog.vel = 0;
  jog.comb = uv('tanque'); jog.integ = 100;
  jog.cargaUn = 0; jog.cargaValor = 0;
  jog.combo = 1; jog.comboT = 0; jog.turbo = 0;
  jog.seco = false; jog.cdDano = 0;
  canas.length = 0; gLimpar();
  plantios.length = 0; parts.length = 0; toasts.length = 0; drones.length = 0; flutu.length = 0;
  pecas.length = 0; rastros.length = 0; passaros.length = 0;
  pragas.length = 0; defensivos.length = 0;
  G.bolsa = { preco: CFG.BOLSA_PRECO_INI, var: 0, cotas: 0, hist: [CFG.BOLSA_PRECO_INI] };
  G._dicaB = false;
  G._gAnt = G.grana; G._gPulso = 0;

function salvarRanking(motivo) {
  const patr = Math.floor(G.grana + bolsaValor());
  const ent = { n: G.nomeJogador || 'OPERADOR', d: G.diasFinal || 0, p: patr,
                v: motivo === 'vitoria' ? 1 : 0, t: Date.now() };
  let lista = [];
  try { lista = JSON.parse(localStorage.getItem(CFG.CHAVE_RANKING) || '[]'); } catch (e) {}
  lista.push(ent);
  lista.sort((a, b) => (b.v - a.v) || (b.d - a.d) || (b.p - a.p));
  lista = lista.slice(0, 8);
  try { localStorage.setItem(CFG.CHAVE_RANKING, JSON.stringify(lista)); } catch (e) {}
  G._rank = lista; G._rankT = ent.t;
}
function fimVitoria() {
  if (G.fase === 'fim') return;
  G.fase = 'fim'; G.fimMotivo = 'vitoria'; G.fimT = 0;
  G.diasFinal = G.diasCampanha;
  if (G.diasFinal > G.recDias) {
    G.recDias = G.diasFinal; G.novoRec = true;
    localStorage.setItem(CFG.CHAVE_REC_DIAS, G.recDias);
  }
  if ((G.picoGrana | 0) > G.recGrana) {
    G.recGrana = G.picoGrana | 0;
    localStorage.setItem(CFG.CHAVE_REC_GRANA, G.recGrana);
  }
  salvarRanking('vitoria');
  SFX.recorde(); setTimeout(() => SFX.recorde(), 500);
}
function fim(motivo) {
  if (G.fase === 'fim') return;
  G.fase = 'fim'; G.fimMotivo = motivo; G.fimT = 0;
  const diasCompletos = motivo === 'plantio' ? G.dia : G.dia - 1;
  G.diasFinal = diasCompletos;
  if (diasCompletos > G.recDias) {
    G.recDias = diasCompletos; G.novoRec = true;
    localStorage.setItem(CFG.CHAVE_REC_DIAS, G.recDias);
    setTimeout(() => SFX.recorde(), 700);
  }
  if ((G.picoGrana | 0) > G.recGrana) {
    G.recGrana = G.picoGrana | 0;
    localStorage.setItem(CFG.CHAVE_REC_GRANA, G.recGrana);
  }
  salvarRanking(motivo);
  SFX.fim();
}

/* ═══════════════════════════════════════════════ update por frame ══ */
function recalcSaude() {
  const c = jog.comp;
  jog.integ = (c.hidraulico + c.rodante + c.corte + c.motor) / 4;
}
function danoComp(mapa) {
  let quebrou = null;
  let houve = false;
  for (const k in mapa) if (mapa[k] > 0.3) houve = true;  // dano "de verdade" (não desgaste)
  if (houve && (G.fase === 'colheita')) {
    G.semDanoDia = false;
    for (const c of G.contratos)
      if (c.id === 'maratona' && !c.feito && !c.falhou) c.prog = 0;
  }
  for (const k in mapa) {
    if (jog.comp[k] === undefined || jog.comp[k] <= 0) continue;
    jog.comp[k] = Math.max(0, jog.comp[k] - mapa[k]);
    if (jog.comp[k] <= 0) quebrou = k;
  }
  recalcSaude();
  if (quebrou && (G.fase === 'colheita' || G.fase === 'plantio'))
    entrarReforma('campo', quebrou);
}
function curarPts(ptsMedia) {                     // reparo distribui p/ o pior
  let resta = ptsMedia * 4, guarda = 0;
  const ks = Object.keys(jog.comp);
  while (resta > 0.01 && guarda++ < 400) {
    ks.sort((a, b) => jog.comp[a] - jog.comp[b]);
    if (jog.comp[ks[0]] >= 100) break;
    const add = Math.min(resta, 100 - jog.comp[ks[0]], 4);
    jog.comp[ks[0]] += add; resta -= add;
  }
  recalcSaude();
}
const fmtH = min => ((min / 60) | 0) + 'h' + String(Math.round(min % 60)).padStart(2, '0');

function sortearMecanicos() {
  const idx = CFG.MECANICOS.map((_, i) => i).filter(() => Math.random() < 0.75);
  while (idx.length < 4) {
    const r = randi(0, CFG.MECANICOS.length - 1);
    if (!idx.includes(r)) idx.push(r);
  }
  return idx.sort((a, b) => a - b);
}
function entrarReforma(motivo, quebrou) {
  if (G.fase === 'reforma' || G.fase === 'fim') return;
  G.reforma = {
    motivo, volta: G.fase, disp: sortearMecanicos(),
    mec: { hidraulico: -1, rodante: -1, corte: -1, motor: -1 },
    rodando: false, fim: {}, taxa: {}, custo: 0, minTot: 0, minPassados: 0,
    plantioPronto: false,
  };
  jog.vel = 0; jog.turbo = 0;
  if (motivo === 'campo') {
    const tow = Math.min(CFG.GUINCHO, G.grana);
    G.grana -= tow; G.stats.gasto += tow;
    toast('🚨 ' + (quebrou ? CFG.COMPONENTES[quebrou].nome : 'MÁQUINA') +
          ' PIFOU! Guincho para a REFORMA LINEAR (−' + $(tow) + ')', 3.6);
    SFX.multa();
  }
  G.fase = 'reforma';
}
function atribuirMec(k) {
  const R = G.reforma;
  if (!R || R.rodando) return;
  const usados = Object.entries(R.mec).filter(([kk, v]) => kk !== k && v >= 0).map(([, v]) => v);
  const livres = R.disp.filter(i => !usados.includes(i));
  const pos = livres.indexOf(R.mec[k]);
  R.mec[k] = pos < 0 ? (livres.length ? livres[0] : -1)
                     : (pos + 1 < livres.length ? livres[pos + 1] : -1);
}
function estimativa(k) {
  const R = G.reforma, mi = R.mec[k];
  if (mi < 0) return null;
  const dano = 100 - jog.comp[k];
  if (dano <= 0.5) return { min: 0, custo: 0 };
  const M = CFG.MECANICOS[mi];
  const min = CFG.COMPONENTES[k].tempo * dano / 100 / (0.55 + M[1] * 0.29);
  return { min, custo: min / 60 * M[2] };
}
function iniciarReparos() {
  const R = G.reforma;
  if (!R || R.rodando) return;
  let custo = 0, maxMin = 0, algum = false;
  for (const k in R.mec) {
    const e = R.mec[k] >= 0 ? estimativa(k) : null;
    if (e && e.min > 0) { algum = true; custo += e.custo; maxMin = Math.max(maxMin, e.min); R.fim[k] = e.min; }
    else R.fim[k] = 0;
  }
  if (!algum) { toast('designe um mecânico a um componente com dano'); return; }
  if (G.grana < custo) {
    toast('💸 Orçamento ' + $(custo) + ' — venda a carga ou resgate a bolsa!'); SFX.multa(); return;
  }
  G.grana -= custo; G.stats.gasto += custo; G.stats.mecanicos += custo;
  R.custo = custo; R.minTot = maxMin; R.minPassados = 0; R.rodando = true;
  for (const k in R.fim) if (R.fim[k] > 0) R.taxa[k] = (100 - jog.comp[k]) / R.fim[k];
  toast('🔧 Equipe na área! Orçamento fechado: ' + $(custo), 2.6); SFX.reparo();
}
function voltarAoCampo() {
  const R = G.reforma;
  if (G.fase !== 'reforma' || !R || R.rodando) return;
  if (Object.values(jog.comp).some(v => v <= 0)) {
    toast('há componente ZERADO — repare antes de voltar'); SFX.multa(); return;
  }
  G.fase = R.volta === 'plantio' ? 'plantio' : 'colheita';
  if (G.fase === 'plantio' && R.plantioPronto) { encerrarPlantio(); return; }
  toast('🚜 Máquina liberada — de volta ao talhão!');
}
function irOficina() {
  if (G.fase !== 'reforma') return;
  const R = G.reforma;
  G.atrasoProxDia = Math.max(0, Math.round((R ? R.minPassados : 0) - 480));
  if (G.atrasoProxDia > 0)
    toast('🌙 Reforma varou a madrugada: amanhã começa às ' +
          hhmm(CFG.HORA_INI + G.atrasoProxDia), 3.5);
  G.fase = 'oficina';
}
function atualizarReforma(dt) {
  const R = G.reforma;
  if (!R || !R.rodando) return;
  const adv = dt * CFG.REFORMA_SIM_VEL;
  R.minPassados += adv;
  for (const k in R.taxa) {
    if (R.fim[k] > 0) {
      const d = Math.min(adv, R.fim[k]);
      jog.comp[k] = Math.min(100, jog.comp[k] + R.taxa[k] * d);
      R.fim[k] -= d;
    }
  }
  recalcSaude();
  if (Math.random() < dt * 14)
    part(jog.x + rand(-24, 24), jog.y + rand(-16, 16), { vx: [-60, 60], vy: [-90, -20],
      vida: [.2, .5], tam: [2, 3], cores: ['#ffd94d', '#ff9a3e', '#cfd6dc'], grav: 240, n: 2 });
  if (Math.random() < dt * 2) SFX.reparo();
  if (R.motivo === 'campo') {
    G.hora += adv;                                 // o relógio não perdoa!
    if (R.volta === 'colheita' && G.hora >= CFG.HORA_FIM && !G.fechou) {
      G.fechou = true;
      if (G.vendidoHoje >= G.meta) {
        if (G.dia >= G.diasCampanha) { fimVitoria(); return; }
        R.motivo = 'noite';
        toast('✅ Meta batida — os reparos seguem pela madrugada', 3);
      } else { fim('meta'); return; }
    }
    if (R.volta === 'plantio' && G.hora >= 30 * 60) {
      if (G.plantadasHoje >= G.metaPlantio) R.plantioPronto = true;
      else { fim('plantio'); return; }
    }
  }
  if (Object.values(R.fim).every(v => v <= 0)) {
    R.rodando = false;
    toast('✅ Reforma concluída em ' + fmtH(R.minPassados), 3); SFX.recorde();
  }
}

function localPt(ox, oy) {
  const c = Math.cos(jog.ang), s = Math.sin(jog.ang);
  return [jog.x + c * ox - s * oy, jog.y + s * ox + c * oy];
}
function tremer(t) { G.tremor = Math.max(G.tremor || 0, t); }

function update(dt) {
  G.t += dt;
  G.flashRaio = Math.max(0, G.flashRaio - dt * 2.2);
  G.tremor = Math.max(0, (G.tremor || 0) - dt);
  atualizarParts(dt); atualizarToasts(dt); atualizarFlutu(dt); atualizarDrones(dt);
  if (G.grana !== G._gAnt) { G._gPulso = 0.32; G._gAnt = G.grana; }
  G._gPulso = Math.max(0, (G._gPulso || 0) - dt);
  for (const n of sombrasNuvem) {
    n.x += n.vx * dt;
    if (n.x - n.rx > MW) { n.x = -n.rx; n.y = rand(0, MH); }
  }
  for (let i = rastros.length - 1; i >= 0; i--) {
    rastros[i].t += dt;
    if (rastros[i].t > 7) rastros.splice(i, 1);
  }

  if (G.fase === 'fim') { G.fimT += dt; motorSom(0, false); chuvaSom(false); return; }
  if (G.fase === 'reforma') { atualizarReforma(dt); motorSom(0, false); chuvaSom(false); return; }
  if (G.fase === 'menu' || G.fase === 'oficina') { motorSom(0, false); chuvaSom(false); return; }
  if (G.pausa || G.ajuda) { motorSom(0, false); return; }

  const colhendo = G.fase === 'colheita';
  if (colhendo) relogio(dt);
  if (G.fase === 'fim') return;                   // relógio pode encerrar o dia
  moverJogador(dt, colhendo);
  if (G.fase === 'fim') return;
  if (colhendo) {
    cortar();
    atualizarCapis(dt);
    atualizarFogos(dt);
    atualizarPragas(dt);
    atualizarPassaros(dt);
    clima(dt);
    if (Math.random() < dt * 2)                   // fumaça da chaminé
      part(USINA.x + 29, USINA.y + 2, { vx: [-6, 8], vy: [-26, -12], vida: [1.2, 2.2],
        tam: [3, 6], cores: ['rgba(205,210,215,.5)', 'rgba(160,166,172,.45)'], grav: -6, n: 1 });
  } else {
    relogioPlantio(dt);
    if (G.fase !== 'plantio') return;              // o relógio pode encerrar
    clima(dt);
    atualizarPassaros(dt);
    const possivel = G.grana + jog.cargaValor * G.tendencia[1] * (1 - CFG.TAXA_DRONE) +
                     bolsaValor() * (1 - CFG.BOLSA_TAXA_RAPIDA);
    if (G.plantadasHoje < G.metaPlantio && possivel < CFG.MUDA_NORMAL) fim('plantio');
  }
  combos(dt);
  motorSom(Math.abs(jog.vel), true);
}

function relogio(dt) {
  G.hora += dt * CFG.MIN_POR_SEG;
  G.stats.minTrab += dt * CFG.MIN_POR_SEG;
  G.bolsa.preco = clamp(G.bolsa.preco * (1 + rand(-1, 1) * 0.0006), 25, 999);
  if (G.praga.hoje && !G.praga.lancada && G.hora >= G.praga.hora) lancarPraga();
  const fz = G.frenesi;
  if (fz.hoje) {
    const dentro = G.hora >= fz.ini && G.hora <= fz.fim;
    if (dentro && !fz.ativa) {
      fz.ativa = true;
      toast('⚡ FRENESI DE MERCADO! Toda venda vale x' + CFG.FRENESI_MULT + ' por um tempo', 3.2);
      SFX.recorde();
    }
    if (!dentro && fz.ativa) { fz.ativa = false; toast('⚡ O frenesi passou.', 2); }
  }
  if (!G.avisou21 && G.hora >= 21 * 60) {
    G.avisou21 = true;
    toast('⏰ 21:00 — última hora! Venda a carga!', 3); SFX.alarme();
  }
  if (!G.fechou && G.hora >= CFG.HORA_FIM) {
    G.fechou = true; jog.vel = 0;
    if (G.capisHoje === 0)
      for (const ct of G.contratos)
        if (ct.id === 'pacifista' && !ct.feito && !ct.falhou) contratoFeito(ct);
    if (G.vendidoHoje >= G.meta) {
      if (G.dia >= G.diasCampanha) { fimVitoria(); return; }
      entrarReforma('noite');
      toast('✅ META BATIDA! Passando na REFORMA LINEAR antes do plantio', 3);
      SFX.recorde();
    } else fim('meta');
  }
}

function relogioPlantio(dt) {                      // 24h de plantio em 3 min
  G.hora += dt * CFG.PLANTIO_MIN_POR_SEG;
  G.stats.minTrab += dt * CFG.PLANTIO_MIN_POR_SEG;
  if (!G._pl2h && G.hora >= 26 * 60) {             // passou das 02:00
    G._pl2h = true;
    for (const c of G.contratosPlantio) if (c.tempo && !c.feito) c.falhou = true;
  }
  G.bolsa.preco = clamp(G.bolsa.preco * (1 + rand(-1, 1) * 0.0006), 25, 999);
  if (!G._avisoPl && G.hora >= 28 * 60) {
    G._avisoPl = true;
    toast('⏰ 04:00 — o plantio encerra às 06:00!', 3); SFX.alarme();
  }
  if (G.hora >= 30 * 60) {
    if (G.plantadasHoje >= G.metaPlantio) {
      toast('🌅 Amanheceu — plantio encerrado.', 2.5);
      encerrarPlantio();
    } else fim('plantio');
  }
}

function moverJogador(dt, colhendo) {
  const parado = jog.seco;
  const velMax = uv('motor') * (jog.turbo > 0 ? 2 : 1) * (colhendo ? 1 : 0.9 * (G._mVelPlantio || 1));
  let alvo = 0;
  if (!parado) {
    if (dpad.fwd) alvo = velMax;
    else if (dpad.re) alvo = -velMax * CFG.VEL_RE;
    if (dpad.esq || dpad.dir) {
      const g = CFG.GIRO * (0.8 + 0.4 * (nivel.esteiras / 3));
      jog.ang += (dpad.dir ? 1 : -1) * g * dt;
    }
  }
  jog.naLama = false;
  for (const l of lamas)
    if (dist2(jog.x, jog.y, l.x, l.y) < l.r * l.r) { jog.naLama = true; break; }
  let fator = 1;
  if (jog.naLama) fator *= uv('esteiras');
  if (G.chuva.ativa) fator *= 0.8;
  alvo *= fator;
  jog.vel += (alvo - jog.vel) * Math.min(1, dt * 4.5);
  if (alvo === 0 && Math.abs(jog.vel) < 2) jog.vel = 0;
  jog.movendo = Math.abs(jog.vel) > 8;
  jog.frame += Math.abs(jog.vel) * dt * 0.06;

  jog.x = clamp(jog.x + Math.cos(jog.ang) * jog.vel * dt, 34, MW - 34);
  jog.y = clamp(jog.y + Math.sin(jog.ang) * jog.vel * dt, 34, MH - 34);

  G._tRastro = (G._tRastro || 0) - dt;                              // marcas no chão
  if (jog.movendo && G._tRastro <= 0) {
    G._tRastro = 0.05;
    if (rastros.length > 240) rastros.shift();
    rastros.push({ x: jog.x - Math.cos(jog.ang) * 6, y: jog.y - Math.sin(jog.ang) * 6, ang: jog.ang, t: 0 });
  }

  if (dentroUsina(jog.x, jog.y, 26)) {            // prédio é sólido
    const l = jog.x - (USINA.x - 26), r = (USINA.x + USINA.w + 26) - jog.x;
    const t = jog.y - (USINA.y - 26), b = (USINA.y + USINA.h + 26) - jog.y;
    const m = Math.min(l, r, t, b);
    if (m === l) jog.x = USINA.x - 26;
    else if (m === r) jog.x = USINA.x + USINA.w + 26;
    else if (m === t) jog.y = USINA.y - 26;
    else jog.y = USINA.y + USINA.h + 26;
    jog.vel *= 0.4;
  }

  jog.cdDano = Math.max(0, jog.cdDano - dt);      // pedras
  for (const p of pedras) {
    const rr = p.r + 20, d2 = dist2(jog.x, jog.y, p.x, p.y);
    if (d2 < rr * rr) {
      const d = Math.sqrt(d2) || 1;
      jog.x = p.x + (jog.x - p.x) / d * rr;
      jog.y = p.y + (jog.y - p.y) / d * rr;
      if (Math.abs(jog.vel) > 50 && jog.cdDano <= 0) {
        jog.cdDano = 0.5; danoComp(CFG.ROTA_DANO.pedra); jog.vel *= -0.25;
        SFX.colisao(); tremer(0.25);
        flut(jog.x, jog.y - 28, '−' + CFG.DANO_PEDRA + ' ⚙', '#ff8a6a');
        part(jog.x, jog.y, { vx: [-90, 90], vy: [-120, -20], vida: [.3, .6],
          tam: [2, 4], cores: ['#ffd94d', '#c9ced4'], grav: 300, n: 10 });
      } else jog.vel *= 0.5;
    }
  }

  for (const a of ARVORES) {                      // troncos são sólidos
    const rr = 29, d2 = dist2(jog.x, jog.y, a.x, a.y);
    if (d2 < rr * rr) {
      const d = Math.sqrt(d2) || 1;
      jog.x = a.x + (jog.x - a.x) / d * rr;
      jog.y = a.y + (jog.y - a.y) / d * rr;
      if (Math.abs(jog.vel) > 60 && jog.cdDano <= 0) {
        jog.cdDano = 0.5; danoComp(CFG.ROTA_DANO.tronco); jog.vel *= -0.2;
        SFX.colisao(); tremer(0.2);
        part(jog.x, jog.y, { vx: [-60, 60], vy: [-100, -20], vida: [.4, .8], tam: [2, 4],
          cores: ['#4d7f36', '#2c5220', '#8a5a30'], grav: 260, n: 8 });
      } else jog.vel *= 0.5;
    }
  }
  for (const L of LAGOAS) {                       // água barra a máquina
    const dx = (jog.x - L.x) / (L.rx + 20), dy = (jog.y - L.y) / (L.ry + 20);
    const k = dx * dx + dy * dy;
    if (k < 1) {
      const d = Math.sqrt(k) || 0.001;
      jog.x = L.x + (dx / d) * (L.rx + 20);
      jog.y = L.y + (dy / d) * (L.ry + 20);
      jog.vel *= 0.35;
      if (Math.random() < 0.4)
        part(jog.x, jog.y, { vx: [-40, 40], vy: [-70, -20], vida: [.3, .5], tam: [2, 3],
          cores: ['#7fc4d4', '#4b8b9c'], grav: 240, n: 3 });
    }
  }

  for (let i = pecas.length - 1; i >= 0; i--) {   // caixas de peças ⚙
    const pc = pecas[i];
    if (dist2(jog.x, jog.y, pc.x, pc.y) < 30 ** 2) {
      pecas.splice(i, 1);
      curarPts(CFG.PECA_INTEG);
      G.grana += CFG.PECA_GRANA; G.stats.ganho += CFG.PECA_GRANA;
      G.picoGrana = Math.max(G.picoGrana || 0, G.grana);
      toast('⚙ Peças na pista! +' + CFG.PECA_INTEG + ' motor · +' + $(CFG.PECA_GRANA));
      SFX.peca(); flut(pc.x, pc.y - 10, '+⚙', '#ffd94d');
      part(pc.x, pc.y, { vx: [-60, 60], vy: [-90, -20], vida: [.3, .6], tam: [2, 3],
        cores: ['#ffd94d', '#caa02a', '#ffffff'], grav: 280, n: 8 });
    }
  }

  if (jog.cargaUn > 0) {                          // descarga na usina = 100%
    const z = USINA.zona;
    if (jog.x > z.x && jog.x < z.x + z.w && jog.y > z.y && jog.y < z.y + z.h) vender(0);
  }

  let cons = jog.movendo ? CFG.CONSUMO_MOVE : CFG.CONSUMO_PARADO;   // diesel
  if (!colhendo) cons *= 0.5;
  if (jog.turbo > 0) cons = 0;
  if (G.chuva.ativa) cons *= 1.25;
  if (colhendo && G.hora > 19 * 60) cons *= 1.10;                   // orvalho noturno
  cons *= (G._mConsumo || 1);                                       // evento (racionamento)
  jog.comb = Math.max(0, jog.comb - cons * dt);
  if (jog.movendo) {                              // desgaste por sistema
    const R = CFG.ROTA_DANO.desgasteS;
    danoComp({ motor: R.motor * dt, rodante: R.rodante * dt,
               hidraulico: R.hidraulico * dt, corte: R.corte * dt });
  }
  const secoAgora = jog.comb <= 0;
  if (secoAgora && !jog.seco) { toast('⛽ SEM DIESEL! Peça reabastecimento (1)', 3); SFX.alarme(); }
  jog.seco = secoAgora;

  const semSaida = jog.cargaValor <= 0 && bolsaValor() <= 0;
  if (jog.seco && G.grana < CFG.PRECO_LITRO) {
    if (semSaida) fim('abandono');
    else if (G.bolsa.cotas > 0 && !G._dicaB) {
      G._dicaB = true; toast('📉 Sem caixa! Resgate a bolsa (B) para não perder o contrato', 3);
    }
  }

  if (jog.movendo && Math.random() < dt * 18) {   // poeira/lama das esteiras
    const [tx, ty] = localPt(-24, rand(-14, 14));
    part(tx, ty, { vx: [-20, 20], vy: [-20, 20], vida: [.3, .7], tam: [2, 4],
      cores: jog.naLama || G.chuva.ativa ? ['#5a4630', '#4a3a26'] : ['#b09a6a', '#8f7c50'], grav: 0, n: 1 });
  }
  if (Math.random() < dt * 7) {                   // fumaça do escapamento
    const [ex, ey] = localPt(-14, -10);
    part(ex, ey, { vx: [-14, 6], vy: [-30, -14], vida: [.5, 1], tam: [2, 5],
      cores: ['rgba(90,90,90,.5)', 'rgba(120,120,120,.4)'], grav: -14, n: 1 });
  }
}

function cortar() {
  if (!jog.movendo || jog.vel < 10) return;
  const [cx, cy] = localPt(CFG.ALCANCE_CORTE, 0);
  G.cdCarga = Math.max(0, G.cdCarga - 0.016);
  gPerto(cx, cy, CFG.RAIO_CORTE, c => {
    if (dist2(cx, cy, c.x, c.y) > CFG.RAIO_CORTE ** 2) return;
    if (jog.cargaUn >= uv('cacamba')) {
      if (G.cdCarga <= 0) { G.cdCarga = 3; toast('📦 CAÇAMBA CHEIA! Venda a carga', 2.5); SFX.alarme(); }
      return;
    }
    gDel(c);
    const k = canas.indexOf(c); if (k >= 0) canas.splice(k, 1);
    if (c.fogo) { const f = fogos.find(f => f.c === c); if (f) fogos.splice(fogos.indexOf(f), 1); }
    danoComp({ corte: CFG.ROTA_DANO.cortePts });   // lâminas gastam cortando
    G.stats.cortes++;
    progContrato('colheita');
    if (G.semDanoDia) progContrato('maratona');    // conta enquanto não tomou dano
    const broqueada = c.praga;
    if (broqueada) removerPraga(c);
    cortadas.push({ x: c.x, y: c.y });
    jog.cargaUn++;
    jog.cargaValor += CFG.CANA_VALOR * (c.prem ? CFG.PREMIUM_MULT : 1) * jog.combo *
                      (jog.turbo > 0 ? 1.5 : 1) * (broqueada ? CFG.PRAGA_VALOR : 1);
    if (broqueada) flut(c.x, c.y - 12, '🐛 broqueada', '#c9a86a');
    if (c.prem) { G.premHoje++; G.stats.prem++; progContrato('premium'); }
    jog.combo = Math.min(CFG.COMBO_MAX, jog.combo + CFG.COMBO_GANHO * (G._mCombo || 1));
    jog.comboT = CFG.COMBO_JANELA;
    G.comboMaxDia = Math.max(G.comboMaxDia, jog.combo);
    progContratoValor('combo', jog.combo);
    SFX.corte();
    part(c.x, c.y, { vx: [-70, 70], vy: [-90, -20], vida: [.3, .6], tam: [2, 4],
      cores: c.prem ? ['#ffd94d', '#fff3b0', '#c79b08'] : ['#7cc85a', '#d8c86a', '#3a7d2c'],
      grav: 260, n: 7 });
    if (c.prem) flut(c.x, c.y - 12, 'PREMIUM ✨', '#ffd94d');
  });
}

function combos(dt) {
  if (jog.turbo > 0) {
    jog.turbo -= dt;
    if (Math.random() < dt * 30) {
      const [ex, ey] = localPt(-14, -10);
      part(ex, ey, { vx: [-40, 10], vy: [-50, -10], vida: [.2, .45], tam: [3, 6],
        cores: ['#ff7b2e', '#ffd94d', '#ff4d2e'], grav: -60, n: 2 });
    }
    if (jog.turbo <= 0) jog.turbo = 0;
  } else if (G.fase === 'colheita') {
    if (jog.comboT > 0) jog.comboT -= dt;
    else jog.combo = Math.max(1, jog.combo - dt * 1.6);
    if (jog.combo >= CFG.COMBO_MAX) {
      jog.turbo = CFG.TURBO_DUR * (G._mTurbo || 1); jog.combo = 1; jog.comboT = 0;
      toast('🔥 MODO TURBO! Velocidade 2x e diesel zero', 2.5);
      SFX.turbo(); tremer(0.3);
    }
  }
}

function atualizarCapis(dt) {
  const noite = G.hora >= 18.5 * 60;
  for (const cp of capis) {
    cp.cd = Math.max(0, cp.cd - dt); cp.frame += dt;
    cp.dorme = noite;
    if (!noite) {
      cp.estT -= dt;
      if (cp.estT <= 0) {
        cp.anda = !cp.anda;
        cp.estT = cp.anda ? rand(2, 4.5) : rand(1, 3);
        if (cp.anda) cp.ang = rand(0, 6.28);
      }
      if (cp.anda) {
        cp.x = clamp(cp.x + Math.cos(cp.ang) * 22 * dt, 60, MW - 60);
        cp.y = clamp(cp.y + Math.sin(cp.ang) * 22 * dt, 60, MH - 60);
        if (dentroUsina(cp.x, cp.y, 40)) cp.ang += Math.PI;
        for (const L of LAGOAS) {
          const dx = (cp.x - L.x) / L.rx, dy = (cp.y - L.y) / L.ry;
          if (dx * dx + dy * dy < 0.8) { cp.ang += Math.PI; break; }
        }
      }
    }
    if (cp.cd <= 0 && jog.movendo && dist2(jog.x, jog.y, cp.x, cp.y) < 34 ** 2) {
      cp.cd = 2;
      G.capisHoje++;
      for (const ct of G.contratos)
        if (ct.id === 'pacifista' && !ct.feito && !ct.falhou) {
          ct.falhou = true; toast('📜 Contrato pacifista quebrado…', 2.2);
        }
      danoComp(CFG.ROTA_DANO.capivara);
      G.stats.capis++; G.stats.gasto += CFG.MULTA_CAPIVARA;
      G.grana = Math.max(0, G.grana - CFG.MULTA_CAPIVARA);
      toast('🚨 MULTA AMBIENTAL −' + $(CFG.MULTA_CAPIVARA) + ' (capivara!)', 3);
      SFX.multa(); SFX.capi(); tremer(0.35);
      flut(jog.x, jog.y - 30, '−' + $(CFG.MULTA_CAPIVARA), '#ff6a5e');
      let x, y, t = 0;                            // ela foge para bem longe
      do { x = rand(120, MW - 120); y = rand(120, MH - 120); }
      while (dist2(x, y, jog.x, jog.y) < 500 ** 2 && ++t < 50);
      cp.x = x; cp.y = y; cp.anda = false; cp.estT = rand(1, 2);
    }
  }
}

/* praga: broca da cana */
function infestar(c) {
  if (!c || c.prot || c.praga) return;
  c.praga = true;
  pragas.push({ c, t: 0, salto: CFG.PRAGA_ESPALHA_T });
}
function removerPraga(c) {
  if (!c.praga) return;
  c.praga = false;
  const k = pragas.findIndex(p => p.c === c);
  if (k >= 0) pragas.splice(k, 1);
}
function lancarPraga() {
  G.praga.lancada = true;
  const livres = canas.filter(c => !c.prot && !c.praga);
  if (!livres.length) return;
  const n = Math.min(livres.length, 1 + Math.min(2, ((G.dia - 1) / 3) | 0));
  for (let i = 0; i < n; i++) infestar(escolha(livres));
  toast('🐛 BROCA DA CANA! Colha rápido ou aplique defensivo (5)', 3.5);
  SFX.praga(); tremer(0.15);
}
function atualizarPragas(dt) {
  for (let i = pragas.length - 1; i >= 0; i--) {
    const p = pragas[i]; p.t += dt; p.salto -= dt;
    if (p.salto <= 0) {                            // a broca pula p/ a vizinha
      p.salto = CFG.PRAGA_ESPALHA_T;
      let alvo = null;
      gPerto(p.c.x, p.c.y, CFG.PRAGA_RAIO, c2 => {
        if (!alvo && c2 !== p.c && !c2.prot && !c2.praga &&
            dist2(c2.x, c2.y, p.c.x, p.c.y) < CFG.PRAGA_RAIO ** 2) alvo = c2;
      });
      if (alvo) infestar(alvo);
    }
    if (p.t > CFG.PRAGA_MORTE_T) {                 // touceira consumida
      const c = p.c;
      c.praga = false;
      gDel(c); const k = canas.indexOf(c); if (k >= 0) canas.splice(k, 1);
      cinzas.push({ x: c.x, y: c.y, seca: true });
      pragas.splice(i, 1);
      part(c.x, c.y, { vx: [-30, 30], vy: [-50, -10], vida: [.4, .8], tam: [2, 3],
        cores: ['#a8863c', '#6b552a'], grav: 120, n: 6 });
      continue;
    }
  }
}

/* fogo, raios e clima */
function acender(c) { if (c.fogo) return; c.fogo = true; fogos.push({ c, t: 0, esp: false }); }
function apagarFogo(f) {
  f.c.fogo = false;
  const k = fogos.indexOf(f); if (k >= 0) fogos.splice(k, 1);
  part(f.c.x, f.c.y, { vx: [-20, 20], vy: [-40, -10], vida: [.4, .8], tam: [3, 5],
    cores: ['#cfd6dc', '#aeb6bd'], grav: -30, n: 6 });
}
function caiRaio() {
  if (!canas.length) return;
  const alvo = escolha(canas);
  G.flashRaio = 1; G.raioPos = { x: alvo.x, y: alvo.y };
  SFX.raio(); tremer(0.3); acender(alvo);
  toast('⚡ RAIO! FOGO NO CANAVIAL — bombeiro (4) custa ' + $(CFG.PRECO_BOMBEIRO), 3.5);
}
function atualizarFogos(dt) {
  for (let i = fogos.length - 1; i >= 0; i--) {
    const f = fogos[i]; f.t += dt;
    if (!f.esp && f.t > CFG.FOGO_ESPALHA_T) {
      f.esp = true;
      gPerto(f.c.x, f.c.y, CFG.FOGO_RAIO, c2 => {
        if (!c2.fogo && dist2(c2.x, c2.y, f.c.x, f.c.y) < CFG.FOGO_RAIO ** 2) acender(c2);
      });
    }
    if (f.t > CFG.FOGO_QUEIMA_T) {                // virou cinza
      const c = f.c;
      removerPraga(c);
      gDel(c); const k = canas.indexOf(c); if (k >= 0) canas.splice(k, 1);
      cinzas.push({ x: c.x, y: c.y });
      fogos.splice(i, 1);
      continue;
    }
    if (Math.random() < dt * 8)
      part(f.c.x + rand(-6, 6), f.c.y + rand(-6, 6), { vx: [-15, 15], vy: [-70, -30],
        vida: [.25, .5], tam: [2, 5], cores: ['#ff7b2e', '#ffd94d', '#ff4d2e'], grav: -40, n: 1 });
  }
  if (fogos.length && Math.random() < dt * 3) SFX.fogo();
  for (const f of fogos)
    if (dist2(jog.x, jog.y, f.c.x, f.c.y) < 30 ** 2) {
      danoComp({ motor: CFG.ROTA_DANO.fogoS.motor * dt, hidraulico: CFG.ROTA_DANO.fogoS.hidraulico * dt });
      break;
    }
}
function clima(dt) {
  const c = G.chuva;
  const dentro = c.hoje && G.hora >= c.ini && G.hora <= c.fim;
  if (dentro && !c.ativa) { c.ativa = true; toast('🌧️ CHUVA! Pista lenta e lama no talhão', 3); }
  if (!dentro && c.ativa) { c.ativa = false; toast('🌤️ Estiou.', 2); }
  chuvaSom(c.ativa && !mudo);
  if (c.ativa) {
    if (Math.random() < dt * 0.8 && lamas.length < CFG.LAMA_MAX) {
      const x = rand(100, MW - 100), y = rand(100, MH - 100);
      if (lugarLivre(x, y, 10)) lamas.push({ x, y, r: rand(34, 60) });
    }
    if (fogos.length && Math.random() < dt * 1.5) apagarFogo(fogos[fogos.length - 1]);
  } else if (G.fase === 'colheita' && Math.random() < CFG.CHANCE_RAIO_S * dt) caiRaio();
}

/* ═══════════════════════════════════════════ ações (botões/teclas) ═ */
function pertoDaUsina() {
  const z = USINA.zona;
  return jog.x > z.x - 40 && jog.x < z.x + z.w + 40 && jog.y > z.y - 40 && jog.y < z.y + z.h + 40;
}
function abastecer() {
  const cap = uv('tanque');
  if (jog.comb >= cap - 0.5) { toast('tanque já está cheio'); return; }
  const naUsina = pertoDaUsina();
  const precoL = CFG.PRECO_LITRO * (naUsina ? 0.5 : 1);
  const gasto = Math.min((cap - jog.comb) * precoL, G.grana);
  if (gasto < precoL) { toast('💸 Sem dinheiro para diesel'); SFX.multa(); return; }
  const litros = gasto / precoL;
  jog.comb = Math.min(cap, jog.comb + litros); G.grana -= gasto; G.stats.gasto += gasto;
  G.litrosAbastecidosHoje += litros;
  progContrato('combustivel', litros);
  toast('⛽ +' + Math.round(litros) + 'L  (−' + $(gasto) + ')' + (naUsina ? ' · preço de usina!' : ''));
  SFX.diesel();
  flut(jog.x, jog.y - 30, '−' + $(gasto), '#ffb35e');
  if (!naUsina) droneAnim('⛽');
}
function consertar() {
  if (jog.integ >= 99.5) { toast('máquina está 100%'); return; }
  const gasto = Math.min((100 - jog.integ) * CFG.PRECO_REPARO, G.grana);
  if (gasto < CFG.PRECO_REPARO) { toast('💸 Sem dinheiro para conserto'); SFX.multa(); return; }
  curarPts(gasto / CFG.PRECO_REPARO); G.grana -= gasto; G.stats.gasto += gasto;
  toast('🔧 Reparo feito  (−' + $(gasto) + ')'); SFX.reparo();
  flut(jog.x, jog.y - 30, '−' + $(gasto), '#8ecae6');
}
function vender(taxa) {
  if (jog.cargaUn <= 0) return;
  const mult = G.tendencia[1] * (G.frenesi.ativa ? CFG.FRENESI_MULT : 1) * (G._mPreco || 1);
  const liquido = jog.cargaValor * mult * (1 - taxa);
  G.grana += liquido; G.vendidoHoje += liquido; G.stats.ganho += liquido;
  G.picoGrana = Math.max(G.picoGrana || 0, G.grana);
  toast((taxa > 0 ? '📦 Drone vendeu por ' : '🏭 Usina pagou ') + $(liquido) +
        (taxa > 0 ? ' (frete −20%)' : ' — sem taxas!'), 2.6);
  flut(jog.x, jog.y - 34, '+' + $(liquido), '#ffe27a');
  if (taxa > 0) SFX.moeda(); else SFX.vendona();
  jog.cargaUn = 0; jog.cargaValor = 0;
  if (taxa === 0) { G.vendasUsinaHoje++; progContrato('usina'); }
}
function venderDrone() {
  if (jog.cargaUn <= 0) { toast('caçamba vazia'); return; }
  vender(CFG.TAXA_DRONE); droneAnim('📦');
  G.vendasDroneHoje++; progContrato('drone');
}
function bombeiro() {
  if (!fogos.length) { toast('nenhum foco de incêndio'); return; }
  if (G.grana < CFG.PRECO_BOMBEIRO) { toast('💸 Bombeiro custa ' + $(CFG.PRECO_BOMBEIRO)); SFX.multa(); return; }
  G.grana -= CFG.PRECO_BOMBEIRO; G.stats.gasto += CFG.PRECO_BOMBEIRO;
  droneAnim('🚒');
  const qtd = fogos.length;
  while (fogos.length) apagarFogo(fogos[0]);
  G.fogosApagadosHoje += qtd;
  for (let i = 0; i < qtd; i++) progContrato('bombeiro');
  toast('🚒 Drone bombeiro apagou ' + qtd + ' foco(s)  (−' + $(CFG.PRECO_BOMBEIRO) + ')', 2.6);
  SFX.bombeiro();
}
function aplicarDefensivo() {
  if (G.fase !== 'colheita' && G.fase !== 'plantio') return;
  if (G.grana < CFG.DEFENSIVO_CUSTO) { toast('💸 Defensivo custa ' + $(CFG.DEFENSIVO_CUSTO)); SFX.multa(); return; }
  G.grana -= CFG.DEFENSIVO_CUSTO; G.stats.gasto += CFG.DEFENSIVO_CUSTO;
  const [sx, sy] = localPt(30, 0);
  const R = CFG.DEFENSIVO_RAIO;
  if (G.fase === 'colheita') {
    let n = 0;
    gPerto(sx, sy, R, c => {
      if (dist2(sx, sy, c.x, c.y) > R * R) return;
      if (c.praga) removerPraga(c);
      if (!c.prot) { c.prot = true; n++; }
    });
    toast('🧪 Defensivo aplicado: ' + n + ' touceiras protegidas  (−' + $(CFG.DEFENSIVO_CUSTO) + ')', 2.6);
  } else {
    defensivos.push({ x: sx, y: sy, r: R });
    for (const pl of plantios)
      if (dist2(sx, sy, pl.x, pl.y) < R * R) pl.prot = true;
    toast('🧪 Área tratada! Mudas e soqueira daqui nascem protegidas  (−' + $(CFG.DEFENSIVO_CUSTO) + ')', 2.8);
  }
  SFX.spray(); tremer(0.06);
  G.defensivosHoje++; progContrato('faxina');
  part(sx, sy, { vx: [-90, 90], vy: [-90, 90], vida: [.35, .7], tam: [2, 3],
    cores: ['#9fe7c0', '#c8f2dd', '#7fd4a8'], grav: -20, n: 26 });
  droneAnim('🧪');
}

/* bolsa de valores — CANA11 */
function bolsaValor() { return G.bolsa.cotas * G.bolsa.preco; }
function comprarCotas(n) {
  const custo = n * G.bolsa.preco;
  if (G.grana < custo) { toast('💸 ' + n + ' cota(s) = ' + $(custo)); SFX.multa(); return; }
  G.grana -= custo; G.bolsa.cotas += n; G.stats.investido += custo;
  toast('📈 Comprou ' + n + ' cota(s) de CANA11  (−' + $(custo) + ')'); SFX.moeda();
}
function venderCotas(n, taxa = 0) {
  n = Math.min(n, G.bolsa.cotas);
  if (n <= 0) { toast('sem cotas para vender'); return; }
  const liquido = n * G.bolsa.preco * (1 - taxa);
  G.bolsa.cotas -= n; G.grana += liquido; G.stats.retirado += liquido;
  G.picoGrana = Math.max(G.picoGrana || 0, G.grana);
  toast('📉 Vendeu ' + n + ' cota(s): +' + $(liquido) +
        (taxa > 0 ? ' (taxa rápida −' + Math.round(taxa * 100) + '%)' : ''));
  SFX.vendona();
}
function resgatarBolsa() {
  if (G.bolsa.cotas <= 0) { toast('você não tem cotas na bolsa'); return; }
  venderCotas(G.bolsa.cotas, CFG.BOLSA_TAXA_RAPIDA);
}

function plantioValido(x, y) {
  if (x < 60 || y < 60 || x > MW - 60 || y > MH - 60) return false;
  if (dentroUsina(x, y, 50)) return false;
  const z = USINA.zona;
  if (x > z.x - 30 && x < z.x + z.w + 30 && y > z.y - 30 && y < z.y + z.h + 30) return false;
  for (const L of LAGOAS) {
    const dx = (x - L.x) / (L.rx + 24), dy = (y - L.y) / (L.ry + 24);
    if (dx * dx + dy * dy < 1) return false;
  }
  for (const a of ARVORES) if (dist2(x, y, a.x, a.y) < 34 ** 2) return false;
  for (const p of pedras) if (dist2(x, y, p.x, p.y) < (p.r + 18) ** 2) return false;
  for (const pl of plantios) if (dist2(x, y, pl.x, pl.y) < 24 ** 2) return false;
  return true;
}
function plantar() {
  if (G.fase !== 'plantio') return;
  const prem = G.mudaPremium;
  const custo = prem ? Math.round(CFG.MUDA_PREMIUM * (G._mMudaPrem || 1))
                     : Math.round(CFG.MUDA_NORMAL * (G._mMudaNorm || 1));
  const [sx, sy] = localPt(34, 0);
  if (!plantioValido(sx, sy)) { toast('solo ocupado aqui'); SFX.multa(); return; }
  if (G.grana < custo) { toast('💸 Muda ' + (prem ? 'premium ' : '') + 'custa ' + $(custo)); SFX.multa(); return; }
  G.grana -= custo; G.stats.gasto += custo;
  const dentro = defensivos.some(d => dist2(sx, sy, d.x, d.y) < d.r * d.r);
  plantios.push({ x: sx, y: sy, prem, prot: dentro });
  G.plantadasHoje++;
  progContrato('pl_extra');                        // total plantado
  if (prem) progContrato('pl_prem');
  if (dentro) progContrato('pl_trat');
  if (G.plantadasHoje === G.metaPlantio && G.hora < 26 * 60)   // cota antes das 02:00
    for (const c of G.contratosPlantio) if (c.id === 'pl_rapido' && !c.feito) contratoFeito(c);
  SFX.plantar();
  part(sx, sy, { vx: [-25, 25], vy: [-40, -8], vida: [.3, .5], tam: [2, 3],
    cores: ['#7cc85a', '#5a3d28'], grav: 180, n: 5 });
}
function soqueiraCabe(x, y) {
  if (dentroUsina(x, y, 50)) return false;
  let ok = true;
  gPerto(x, y, 18, c => { if (dist2(x, y, c.x, c.y) < 18 ** 2) ok = false; });
  for (const p of pedras) if (dist2(x, y, p.x, p.y) < (p.r + 14) ** 2) ok = false;
  for (const a of ARVORES) if (dist2(x, y, a.x, a.y) < 30 ** 2) ok = false;
  for (const L of LAGOAS) {
    const dx = (x - L.x) / (L.rx + 20), dy = (y - L.y) / (L.ry + 20);
    if (dx * dx + dy * dy < 1) ok = false;
  }
  return ok;
}
function irPlantio() {                            // oficina → plantio (24h corridas)
  canas.length = 0; gLimpar(); fogos.length = 0; pragas.length = 0;
  G.fase = 'plantio'; G.plantadasHoje = 0; G.mudaPremium = false;
  G.hora = CFG.HORA_INI; G._avisoPl = false; G._pl2h = false;
  comSemente(() => {
    G.chuva = { hoje: Math.random() < 0.45, ini: 0, fim: 0, ativa: false };
    if (G.chuva.hoje) { G.chuva.ini = rand(10 * 60, 26 * 60); G.chuva.fim = G.chuva.ini + rand(90, 180); }
    sortearEventoPlantio();                        // << clima do plantio (pode mexer na cota/chuva)
    if (G._chuvaForca) { G.chuva = { hoje: true, ini: 6 * 60, fim: 30 * 60, ativa: false }; }
    sortearContratosPlantio();
  });
  toast('🌱 PLANTIO · cota ' + G.metaPlantio + ' mudas até 06:00 (24h = 3 min!)', 4);
  if (G.evento && G.evento.id !== 'pl_normal')
    toast(G.evento.icone + ' ' + G.evento.nome + ' — ' + G.evento.desc, 5);
  if (G.contratosPlantio.length)
    toast('📜 ' + G.contratosPlantio.length + ' tarefa(s) de plantio hoje!', 4);
}
function encerrarPlantio() {
  if (G.plantadasHoje < G.metaPlantio) {
    toast('cota de plantio: faltam ' + (G.metaPlantio - G.plantadasHoje) + ' mudas'); SFX.multa(); return;
  }
  for (const pl of plantios) novaCana(pl.x, pl.y, pl.prem, pl.prot);
  let re = 0;
  for (const s of cortadas)
    if (Math.random() < CFG.SOQUEIRA * (G._mSoqueira || 1) && soqueiraCabe(s.x, s.y)) {
      novaCana(s.x, s.y, false, defensivos.some(d => dist2(s.x, s.y, d.x, d.y) < d.r * d.r));
      re++;
    }
  plantios.length = 0;
  G.dia++;
  comSemente(sortearDia);
  if (re) toast('🌱 A soqueira rebrotou ' + re + ' touceiras de graça!', 3);
  G.fase = 'colheita';
}

function atualizarPassaros(dt) {
  for (let i = passaros.length - 1; i >= 0; i--) {
    const g = passaros[i]; g.t += dt;
    if (g.estado === 'pousado') {
      if (dist2(jog.x, jog.y, g.x, g.y) < 115 ** 2) {
        g.estado = 'voando'; g.t = 0;
        const a = Math.atan2(g.y - jog.y, g.x - jog.x) + rand(-0.5, 0.5);
        g.vx = Math.cos(a) * 150; g.vy = Math.sin(a) * 150;
      }
    } else {
      g.x += g.vx * dt; g.y += g.vy * dt;
      if (g.t > 3) passaros.splice(i, 1);
    }
  }
}

/* partículas / toasts / flutuantes / drones cosméticos */
function part(x, y, o) {
  for (let i = 0; i < (o.n || 1); i++) {
    if (parts.length > 420) parts.shift();
    parts.push({ x, y, vx: rand(o.vx[0], o.vx[1]), vy: rand(o.vy[0], o.vy[1]),
      vida: rand(o.vida[0], o.vida[1]), t: 0, tam: rand(o.tam[0], o.tam[1]),
      cor: escolha(o.cores), grav: o.grav || 0 });
  }
}
function atualizarParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.t += dt;
    if (p.t >= p.vida) { parts.splice(i, 1); continue; }
    p.vy += p.grav * dt; p.x += p.vx * dt; p.y += p.vy * dt;
  }
}
function toast(txt, dur = 2.2) { toasts.push({ txt, dur, t: 0 }); if (toasts.length > 4) toasts.shift(); }
function atualizarToasts(dt) {
  for (let i = toasts.length - 1; i >= 0; i--) { toasts[i].t += dt; if (toasts[i].t > toasts[i].dur) toasts.splice(i, 1); }
}
function flut(x, y, txt, cor) { flutu.push({ x, y, txt, cor, t: 0 }); }
function atualizarFlutu(dt) {
  for (let i = flutu.length - 1; i >= 0; i--) { flutu[i].t += dt; if (flutu[i].t > 1.3) flutu.splice(i, 1); }
}
function droneAnim(icone) {
  drones.push({ icone, x: jog.x + rand(-30, 30), y: jog.y - 300, ax: jog.x, ay: jog.y - 52, fase: 0, t: 0 });
}
function atualizarDrones(dt) {
  for (let i = drones.length - 1; i >= 0; i--) {
    const d = drones[i]; d.t += dt;
    if (d.fase === 0) {
      d.x += (d.ax - d.x) * dt * 4; d.y += (d.ay - d.y) * dt * 4;
      if (Math.abs(d.y - d.ay) < 6) { d.fase = 1; d.t = 0; }
    } else if (d.fase === 1) {
      d.y = d.ay + Math.sin(d.t * 9) * 3;
      if (d.t > 0.6) { d.fase = 2; d.t = 0; }
    } else {
      d.y -= 260 * dt; d.x += 120 * dt;
      if (d.t > 1.4) drones.splice(i, 1);
    }
  }
}

<script>
'use strict';
/* ═══════════════════════════════════════════════════════ render ════ */
let LUZ = null, luzc = null, VIN = null;
const botoesTela = [];                            // hit-test dos botões do HUD
const frameEl = document.getElementById('frame');

function emTelaCheia() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
function alternarTelaCheia() {
  if (!emTelaCheia()) {
    const req = frameEl && (frameEl.requestFullscreen || frameEl.webkitRequestFullscreen);
    if (req) {
      const p = req.call(frameEl);
      if (p && p.catch) p.catch(() => {});
      try {
        if (typeof screen !== 'undefined' && screen.orientation && screen.orientation.lock)
          screen.orientation.lock('landscape').catch(() => {});
      } catch (e) { /* trava de orientação é opcional */ }
    } else {
      toast('📱 Navegador sem tela cheia — no iPhone use "Compartilhar → Adicionar à Tela de Início"', 4);
    }
  } else {
    const sair = document.exitFullscreen || document.webkitExitFullscreen;
    if (sair) sair.call(document);
  }
}
function aoMudarTela() { G.telaCheia = emTelaCheia(); }
document.addEventListener('fullscreenchange', aoMudarTela);
document.addEventListener('webkitfullscreenchange', aoMudarTela);

function comprarUpg(k) {
  const u = CFG.UPG[k];
  if (nivel[k] >= 3) return;
  const p = u.precos[nivel[k]];
  if (G.grana < p) { toast('💸 Falta grana para ' + u.nome); SFX.multa(); return; }
  G.grana -= p; nivel[k]++; G.stats.gasto += p;
  SFX.moeda(); toast('🔩 ' + u.nome + ' nível ' + nivel[k] + '!');
}

function tintaDia(h) {                            // cor do dia (amanhecer/entardecer)
  if (h < 8 * 60) {
    const a = clamp(1 - (h - 360) / 120, 0, 1) * 0.15;
    return a > 0.01 ? 'rgba(255,175,90,' + a.toFixed(3) + ')' : null;
  }
  if (h > 16 * 60) {
    if (h < 18 * 60) {
      const a = clamp((h - 960) / 120, 0, 1) * 0.12;
      return 'rgba(255,145,60,' + a.toFixed(3) + ')';
    }
    const a = Math.min(0.22, clamp((h - 1080) / 90, 0, 1) * 0.16 + 0.12);
    return 'rgba(140,80,150,' + a.toFixed(3) + ')';
  }
  return null;
}

function render() {
  botoesTela.length = 0;
  const Z = MOBILE ? CFG.ZOOM_MOBILE : 1;
  const vw = W / Z, vh = H / Z;                     // janela de mundo visível
  cam.x = clamp(jog.x - vw / 2, 0, MW - vw);
  cam.y = clamp(jog.y - vh / 2, 0, MH - vh);
  const escuro = G.fase === 'colheita' ? clamp((G.hora - 18 * 60) / 150, 0, 1) * 0.72 : 0;

  ctx.save();
  if ((G.tremor || 0) > 0)
    ctx.translate(rand(-1, 1) * G.tremor * 12, rand(-1, 1) * G.tremor * 12);
  ctx.scale(Z, Z);
  ctx.translate(-cam.x, -cam.y);

  ctx.drawImage(CHAO, 0, 0);

  for (const r of rastros) {                                        // marcas de esteira
    const a = 0.20 * (1 - r.t / 7);
    if (a <= 0) continue;
    ctx.fillStyle = 'rgba(58,45,26,' + a.toFixed(3) + ')';
    const si = Math.sin(r.ang), co = Math.cos(r.ang);
    ctx.fillRect(r.x - si * 11 - 2, r.y + co * 11 - 2, 4, 4);
    ctx.fillRect(r.x + si * 11 - 2, r.y - co * 11 - 2, 4, 4);
  }
  ctx.strokeStyle = 'rgba(215,240,245,.4)'; ctx.lineWidth = 2;      // brilho da água
  for (const L of LAGOAS) {
    if (L.x + L.rx < cam.x || L.x - L.rx > cam.x + W ||
        L.y + L.ry < cam.y || L.y - L.ry > cam.y + H) continue;
    for (let i = 0; i < 5; i++) {
      const px = L.x + Math.sin(G.t * 0.6 + i * 1.9) * L.rx * 0.55;
      const py = L.y + Math.cos(G.t * 0.45 + i * 1.3) * L.ry * 0.5;
      ctx.beginPath(); ctx.moveTo(px - 7, py); ctx.lineTo(px + 7, py); ctx.stroke();
    }
  }

  for (const cz of cinzas) {                                        // cinzas
    if (cz.x < cam.x - 20 || cz.x > cam.x + W + 20 || cz.y < cam.y - 20 || cz.y > cam.y + H + 20) continue;
    ctx.fillStyle = cz.seca ? 'rgba(96,78,38,.7)' : 'rgba(34,30,26,.75)';
    ctx.beginPath(); ctx.ellipse(cz.x, cz.y, 10, 6, 0, 0, 7); ctx.fill();
    ctx.fillStyle = cz.seca ? 'rgba(150,122,58,.6)' : 'rgba(70,62,54,.6)';
    ctx.fillRect(cz.x - 3, cz.y - 2, 2, 2);
  }
  for (const l of lamas) {                                          // lama
    if (l.x < cam.x - 70 || l.x > cam.x + W + 70 || l.y < cam.y - 70 || l.y > cam.y + H + 70) continue;
    ctx.fillStyle = '#4a3823';
    ctx.beginPath(); ctx.ellipse(l.x, l.y, l.r, l.r * 0.66, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#5d4629';
    ctx.beginPath(); ctx.ellipse(l.x, l.y - 2, l.r * 0.86, l.r * 0.54, 0, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(140,116,80,.35)';
    ctx.beginPath(); ctx.ellipse(l.x - l.r * 0.25, l.y - l.r * 0.2, l.r * 0.3, l.r * 0.14, 0, 0, 7); ctx.fill();
  }
  if (G.fase === 'plantio')
    for (const d of defensivos) {                                   // zonas tratadas
      ctx.fillStyle = 'rgba(120,220,170,.08)';
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 7); ctx.fill();
      ctx.strokeStyle = 'rgba(120,220,170,.55)'; ctx.setLineDash([6, 6]); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, 7); ctx.stroke();
      ctx.setLineDash([]);
    }
  for (const pl of plantios) {                                      // brotos
    ctx.drawImage(SPR.broto, pl.x - 6, pl.y - 8);
    if (pl.prem) {
      ctx.strokeStyle = 'rgba(240,200,20,.8)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(pl.x, pl.y, 8, 0, 7); ctx.stroke();
    }
    if (pl.prot) { ctx.fillStyle = '#7fe0b8'; ctx.fillRect(pl.x + 5, pl.y - 9, 3, 3); }
  }
  gPerto(cam.x + W / 2, cam.y + H / 2, 580, c => {                  // canas (cull + balanço)
    ctx.fillStyle = 'rgba(16,26,8,.26)';
    ctx.beginPath(); ctx.ellipse(c.x + 2, c.y + 8, 10, 4, 0, 0, 7); ctx.fill();
    const tr = c.fogo ? rand(-1.2, 1.2) : (c.praga ? Math.sin(G.t * 9 + c.x) * 0.8 : 0);
    const sw = Math.sin(G.t * 1.7 + c.x * 0.035 + c.y * 0.02) * 1.5;
    ctx.drawImage(c.prem ? SPR.canaPrem[c.vari] : SPR.cana[c.vari], c.x - 13 + tr + sw, c.y - 13 + tr);
    if (c.prem && Math.floor(G.t * 5 + c.x) % 3 === 0) {
      ctx.fillStyle = '#fff8d0'; ctx.fillRect(c.x + 6, c.y - 9, 2, 2);
    }
    if (c.prot) { ctx.fillStyle = 'rgba(127,224,184,.9)'; ctx.fillRect(c.x - 11, c.y - 11, 3, 3); }
    if (c.praga) {                                                  // bichinhos da broca
      const b = G.t * 3 + c.x;
      ctx.fillStyle = 'rgba(180,140,40,.16)';
      ctx.beginPath(); ctx.arc(c.x, c.y, 12, 0, 7); ctx.fill();
      ctx.fillStyle = '#5b3d1e';
      ctx.fillRect(c.x + Math.sin(b) * 6 - 1, c.y + Math.cos(b * 1.3) * 5 - 1, 3, 3);
      ctx.fillRect(c.x + Math.sin(b + 2.5) * 5 - 1, c.y + Math.cos(b * 0.8 + 1) * 6 - 1, 2, 2);
    }
  });
  for (const p of pedras) {                                         // pedras
    const s = SPR.pedra[p.vari];
    ctx.drawImage(s, p.x - s.width / 2, p.y - s.height / 2);
  }
  for (const pc of pecas) {                                         // caixas de peças
    if (pc.x < cam.x - 30 || pc.x > cam.x + W + 30 || pc.y < cam.y - 30 || pc.y > cam.y + H + 30) continue;
    ctx.fillStyle = 'rgba(16,24,10,.28)';
    ctx.beginPath(); ctx.ellipse(pc.x + 1, pc.y + 6, 8, 3.4, 0, 0, 7); ctx.fill();
    const gl = 0.5 + 0.5 * Math.sin(G.t * 4 + pc.rot);
    ctx.fillStyle = 'rgba(255,220,90,' + (0.15 + gl * 0.2).toFixed(3) + ')';
    ctx.beginPath(); ctx.arc(pc.x, pc.y, 13 + gl * 3, 0, 7); ctx.fill();
    ctx.save(); ctx.translate(pc.x, pc.y); ctx.rotate(G.t * 1.6 + pc.rot);
    ctx.drawImage(SPR.peca, -9, -9); ctx.restore();
  }
  for (const cp of capis) {                                         // capivaras
    if (cp.x < cam.x - 40 || cp.x > cam.x + W + 40 || cp.y < cam.y - 40 || cp.y > cam.y + H + 40) continue;
    ctx.fillStyle = 'rgba(16,24,10,.28)';
    ctx.beginPath(); ctx.ellipse(cp.x + 1, cp.y + 6, 13, 5, 0, 0, 7); ctx.fill();
    ctx.save(); ctx.translate(cp.x, cp.y);
    if (Math.cos(cp.ang) < 0) ctx.scale(-1, 1);
    const spr = cp.dorme ? SPR.capiDorme : SPR.capi[cp.anda ? (cp.frame * 6 | 0) % 2 : 0];
    ctx.drawImage(spr, -15, -9);
    ctx.restore();
    if (cp.dorme) {
      ctx.fillStyle = 'rgba(230,240,255,.85)';
      ctx.font = '700 11px "Courier New", monospace';
      ctx.fillText('z', cp.x + 10, cp.y - 12 - Math.sin(G.t * 2) * 3);
    }
  }
  for (const f of fogos) {                                          // chamas
    const fx = f.c.x, fy = f.c.y;
    for (let i = 0; i < 3; i++) {
      const a = rand(0, 6.28), rr = rand(2, 7);
      ctx.fillStyle = escolha(['#ff7b2e', '#ffd94d', '#ff4d2e']);
      ctx.beginPath();
      ctx.ellipse(fx + Math.cos(a) * 4, fy - rand(2, 12), rr * 0.6, rr, 0, 0, 7);
      ctx.fill();
    }
  }

  if (G.fase === 'plantio') {                                       // fantasma do plantio
    const [gx, gy] = localPt(34, 0);
    const ok = plantioValido(gx, gy);
    ctx.strokeStyle = ok ? 'rgba(124,200,90,.9)' : 'rgba(255,90,70,.9)';
    ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(gx, gy, 12, 0, 7); ctx.stroke();
    ctx.setLineDash([]);
  }

  { // colhedora
    ctx.fillStyle = 'rgba(14,20,8,.32)';                            // sombra da máquina
    ctx.beginPath(); ctx.ellipse(jog.x + 3, jog.y + 7, 27, 15, jog.ang, 0, 7); ctx.fill();
    ctx.save();
    ctx.translate(jog.x, jog.y); ctx.rotate(jog.ang);
    const fr = jog.movendo ? (jog.frame | 0) % 2 : 0;
    ctx.drawImage(SPR.colhedora[fr], -28, -18);
    ctx.restore();
    if (Math.floor(G.t * 3) % 2 === 0) {                            // giroflex
      const [gfx, gfy] = localPt(4, -9);
      ctx.fillStyle = 'rgba(255,148,0,.95)'; ctx.fillRect(gfx - 2, gfy - 2, 4, 4);
      if (escuro > 0.1) {
        ctx.fillStyle = 'rgba(255,160,40,.22)';
        ctx.beginPath(); ctx.arc(gfx, gfy, 15, 0, 7); ctx.fill();
      }
    }
    if (jog.quebrada && Math.floor(G.t * 3) % 2 === 0) {
      ctx.fillStyle = '#ff5a4a'; ctx.font = '700 18px "Courier New", monospace';
      ctx.fillText('!', jog.x - 3, jog.y - 26);
    }
  }

  for (const a of ARVORES) {                                        // copas por cima de tudo
    if (a.x < cam.x - 80 || a.x > cam.x + W + 80 || a.y < cam.y - 80 || a.y > cam.y + H + 80) continue;
    const sA = SPR.arvore[a.v];
    ctx.save(); ctx.translate(a.x, a.y);
    ctx.rotate(Math.sin(G.t * 0.7 + a.x * 0.01) * 0.03);
    ctx.drawImage(sA, -sA.width / 2, -sA.height / 2);
    ctx.restore();
  }
  for (const g of passaros) {                                       // pássaros
    if (g.x < cam.x - 60 || g.x > cam.x + W + 60 || g.y < cam.y - 60 || g.y > cam.y + H + 60) continue;
    for (let i = 0; i < g.n; i++) {
      const ox = (i % 3) * 10 - 10, oy = ((i / 3) | 0) * 8 - 4;
      const bx = g.x + ox, by = g.y + oy;
      if (g.estado === 'pousado') {
        ctx.fillStyle = '#3a2f22';
        ctx.fillRect(bx, by + Math.sin(G.t * 3 + i) * 1, 3, 3);
