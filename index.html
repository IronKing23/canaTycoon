      } else {
        const fl = Math.sin(G.t * 16 + i) > 0 ? 3 : 0;
        ctx.strokeStyle = '#241c12'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx - 4, by - fl);
        ctx.lineTo(bx, by + 2); ctx.lineTo(bx + 4, by - fl); ctx.stroke();
      }
    }
  }
  if (escuro > 0.1 && Math.floor(G.t * 2) % 2 === 0) {              // luz da chaminé
    ctx.fillStyle = '#ff4040'; ctx.fillRect(USINA.x + 27, USINA.y + 1, 4, 4);
    ctx.fillStyle = 'rgba(255,64,64,.22)';
    ctx.beginPath(); ctx.arc(USINA.x + 29, USINA.y + 3, 10, 0, 7); ctx.fill();
  }
  for (const d of drones) {                                         // drones de serviço
    ctx.fillStyle = '#2f353c'; ctx.fillRect(d.x - 9, d.y - 3, 18, 6);
    ctx.fillStyle = 'rgba(180,190,200,.8)';
    const rot = Math.sin(G.t * 40) * 6;
    ctx.fillRect(d.x - 14 - rot / 3, d.y - 6, 8, 2); ctx.fillRect(d.x + 6 + rot / 3, d.y - 6, 8, 2);
    ctx.font = '12px "Segoe UI", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.icone, d.x, d.y + 16); ctx.textAlign = 'left';
  }

  for (const p of parts) {                                          // partículas
    ctx.globalAlpha = clamp(1 - p.t / p.vida, 0, 1);
    ctx.fillStyle = p.cor;
    ctx.fillRect(p.x, p.y, p.tam, p.tam);
  }
  ctx.globalAlpha = 1;

  for (const n of sombrasNuvem) {                                   // sombras de nuvem
    if (n.x + n.rx < cam.x || n.x - n.rx > cam.x + W ||
        n.y + n.ry < cam.y || n.y - n.ry > cam.y + H) continue;
    ctx.fillStyle = 'rgba(14,24,34,.10)';
    ctx.beginPath(); ctx.ellipse(n.x, n.y, n.rx, n.ry, 0, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(14,24,34,.08)';
    ctx.beginPath(); ctx.ellipse(n.x + n.rx * 0.3, n.y + 12, n.rx * 0.7, n.ry * 0.7, 0, 0, 7); ctx.fill();
  }

  ctx.font = '700 13px "Courier New", monospace';                   // textos flutuantes
  for (const f of flutu) {
    ctx.globalAlpha = clamp(1 - f.t / 1.3, 0, 1);
    ctx.fillStyle = f.cor;
    ctx.fillText(f.txt, f.x - 14, f.y - f.t * 30);
  }
  ctx.globalAlpha = 1;

  if (G.flashRaio > 0.5 && G.raioPos) {                             // o raio em si
    ctx.strokeStyle = 'rgba(255,255,255,.95)'; ctx.lineWidth = 3;
    ctx.beginPath();
    let rx = G.raioPos.x, ry = cam.y - 10;
    ctx.moveTo(rx + rand(-30, 30), ry);
    while (ry < G.raioPos.y - 20) { ry += rand(30, 60); rx += rand(-26, 26); ctx.lineTo(rx, ry); }
    ctx.lineTo(G.raioPos.x, G.raioPos.y);
    ctx.stroke();
  }
  ctx.restore();                                                    // fim do mundo

  if (G.flashRaio > 0) {                                            // clarão
    ctx.fillStyle = 'rgba(255,255,255,' + (G.flashRaio * 0.4) + ')';
    ctx.fillRect(0, 0, W, H);
  }
  if (G.chuva.ativa) {                                              // chuva na tela
    ctx.fillStyle = 'rgba(40,60,110,.12)'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(190,215,245,.4)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < 90; i++) {
      const x = ((i * 137 + G.t * 520) % (W + 60)) - 30;
      const y = (i * 89 + G.t * 900) % H;
      ctx.moveTo(x, y); ctx.lineTo(x - 4, y + 12);
    }
    ctx.stroke();
  }

  const tinta = G.fase === 'colheita' ? tintaDia(G.hora) : null;    // cor do dia
  if (tinta) { ctx.fillStyle = tinta; ctx.fillRect(0, 0, W, H); }

  if (escuro > 0.02 && LUZ) {                                       // noite + faróis
    luzc.clearRect(0, 0, W, H);
    luzc.fillStyle = 'rgba(8, 12, 40,' + escuro + ')';
    luzc.fillRect(0, 0, W, H);
    luzc.globalCompositeOperation = 'destination-out';
    const px = (jog.x - cam.x) * Z, py = (jog.y - cam.y) * Z;
    let g = luzc.createRadialGradient(px, py, 10 * Z, px, py, 120 * Z); // luz ambiente
    g.addColorStop(0, 'rgba(255,255,255,.9)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    luzc.fillStyle = g;
    luzc.beginPath(); luzc.arc(px, py, 120 * Z, 0, 7); luzc.fill();
    luzc.save();                                                     // cone do farol
    luzc.translate(px, py); luzc.rotate(jog.ang); luzc.scale(Z, Z);
    g = luzc.createLinearGradient(0, 0, 250, 0);
    g.addColorStop(0, 'rgba(255,255,255,.95)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    luzc.fillStyle = g;
    luzc.beginPath();
    luzc.moveTo(22, -10); luzc.lineTo(250, -78); luzc.lineTo(250, 78); luzc.lineTo(22, 10);
    luzc.closePath(); luzc.fill();
    luzc.restore();
    const ux = (USINA.x + USINA.w / 2 - cam.x) * Z, uy = (USINA.y + USINA.h - cam.y) * Z; // usina
    g = luzc.createRadialGradient(ux, uy, 10 * Z, ux, uy, 150 * Z);
    g.addColorStop(0, 'rgba(255,255,255,.6)'); g.addColorStop(1, 'rgba(255,255,255,0)');
    luzc.fillStyle = g;
    luzc.beginPath(); luzc.arc(ux, uy, 150 * Z, 0, 7); luzc.fill();
    luzc.globalCompositeOperation = 'source-over';
    ctx.drawImage(LUZ, 0, 0);
  }

  if (VIN) ctx.drawImage(VIN, 0, 0);                                // vinheta

  desenharHUD();
  if (G.fase === 'menu') desenharMenu();
  if (G.fase === 'reforma') desenharReforma();
  if (G.fase === 'oficina') desenharOficina();
  if (G.fase === 'fim') desenharFim();
  if (G.pausa) desenharPausa();
  if (G.ajuda) desenharAjuda();

  if (TOQUE && window.innerHeight > window.innerWidth) {            // aviso retrato
    ctx.fillStyle = 'rgba(10,14,8,.92)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f0c814'; ctx.textAlign = 'center';
    ctx.font = '700 26px "Courier New", monospace';
    ctx.fillText('📱↻  GIRE O CELULAR', W / 2, H / 2 - 8);
    ctx.font = '15px "Courier New", monospace'; ctx.fillStyle = '#cfe0b8';
    ctx.fillText('O canavial é melhor na horizontal', W / 2, H / 2 + 24);
    ctx.textAlign = 'left';
  }
}

/* ══════════════════════════════════════════════════════════ HUD ═══ */
function barra(x, y, w, h, frac, cor, pisca) {
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = pisca && Math.floor(G.t * 5) % 2 === 0 ? '#ffffff' : cor;
  ctx.fillRect(x + 2, y + 2, Math.max(2, (w - 4) * clamp(frac, 0, 1)), h - 4);
  ctx.fillStyle = 'rgba(255,255,255,.16)';
  ctx.fillRect(x + 2, y + 2, Math.max(2, (w - 4) * clamp(frac, 0, 1)), 2);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  for (let i = 1; i < 4; i++) ctx.fillRect(x + (w * i / 4) | 0, y + 2, 1, h - 4);
  ctx.strokeStyle = 'rgba(230,240,220,.35)'; ctx.lineWidth = 1;
  ctx.strokeRect(x + .5, y + .5, w - 1, h - 1);
}
function chip(x, y, w, h, rot, sub, ativo, cb) {
  ctx.fillStyle = ativo ? 'rgba(18,26,14,.88)' : 'rgba(18,24,16,.55)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = ativo ? '#f0c814' : '#46523c'; ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = ativo ? '#eef2e0' : '#84907a';
  ctx.font = '700 13px "Courier New", monospace'; ctx.textAlign = 'left';
  ctx.fillText(rot, x + 8, y + 16);
  if (sub) {
    ctx.font = '11px "Courier New", monospace';
    ctx.fillStyle = ativo ? '#c2ceac' : '#6d7a62';
    ctx.fillText(sub, x + 8, y + 30);
  }
  if (ativo && cb) botoesTela.push({ x, y, w, h, cb });
}

function btnM(x, y, w, h, icone, sub, ativo, cor, cb) {   // botão grande (mobile)
  ctx.fillStyle = ativo ? 'rgba(20,30,16,.92)' : 'rgba(20,26,18,.5)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = ativo ? (cor || '#f0c814') : '#46523c'; ctx.lineWidth = 2.5;
  ctx.strokeRect(x, y, w, h);
  ctx.textAlign = 'center';
  ctx.globalAlpha = ativo ? 1 : 0.45;
  ctx.font = '27px "Segoe UI", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(icone, x + w / 2, y + (sub ? h / 2 + 2 : h / 2 + 9));
  if (sub) {
    ctx.font = '700 12px "Courier New", monospace';
    ctx.fillStyle = ativo ? '#cfe0b8' : '#6d7a62';
    ctx.fillText(sub, x + w / 2, y + h - 7);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
  if (ativo && cb) botoesTela.push({ x, y, w, h, cb });
}
function iconeTopo(x, rot, cb) {                   // ícone utilitário grande no topo
  ctx.fillStyle = 'rgba(18,26,14,.75)'; ctx.fillRect(x, 8, 42, 42);
  ctx.strokeStyle = 'rgba(220,230,200,.55)'; ctx.lineWidth = 2; ctx.strokeRect(x, 8, 42, 42);
  ctx.fillStyle = '#eef2e0'; ctx.font = '700 22px "Courier New", monospace'; ctx.textAlign = 'center';
  ctx.fillText(rot, x + 21, 37); ctx.textAlign = 'left';
  botoesTela.push({ x, y: 8, w: 42, h: 42, cb });
}

function desenharHUDMobile() {
  const worst = Math.min(jog.comp.hidraulico, jog.comp.rodante, jog.comp.corte, jog.comp.motor);
  const colheita = G.fase === 'colheita';

  // ---------- FAIXA SUPERIOR (alta, fontes grandes) ----------
  const gTopo = ctx.createLinearGradient(0, 0, 0, 100);
  gTopo.addColorStop(0, 'rgba(16,24,12,.94)'); gTopo.addColorStop(1, 'rgba(6,10,5,.86)');
  ctx.fillStyle = gTopo; ctx.fillRect(0, 0, W, 100);
  ctx.fillStyle = '#3d5228'; ctx.fillRect(0, 100, W, 2);
  ctx.fillStyle = 'rgba(240,200,20,.35)'; ctx.fillRect(0, 102, W, 1);

  // grana
  const p = 1 + (G._gPulso || 0) * 0.9;
  ctx.fillStyle = '#8a6b00'; ctx.beginPath(); ctx.arc(34, 30, 15 * p, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffd94d'; ctx.beginPath(); ctx.arc(32, 28, 15 * p, 0, 7); ctx.fill();
  ctx.fillStyle = '#8a6b00'; ctx.font = '700 20px "Courier New", monospace';
  ctx.fillText('$', 25, 35);
  ctx.font = '700 34px "Courier New", monospace'; ctx.fillStyle = '#ffd94d';
  ctx.fillText($(G.grana).slice(1), 56, 40);

  // DIA + relógio (centro, GRANDE — prazo das 22:00)
  ctx.textAlign = 'center';
  ctx.font = '700 16px "Courier New", monospace'; ctx.fillStyle = '#cfe0b8';
  ctx.fillText('DIA ' + G.dia + '/' + G.diasCampanha, W / 2, 22);
  const tarde = G.hora >= 21 * 60;
  ctx.font = '700 34px "Courier New", monospace';
  ctx.fillStyle = tarde && Math.floor(G.t * 4) % 2 === 0 ? '#ff5a4a' : '#eef2e0';
  ctx.fillText(G.fase === 'plantio' ? hhmm(G.hora) : hhmm(G.hora), W / 2, 50);
  // tendência + frenesi
  const td = G.tendencia;
  ctx.font = '700 17px "Courier New", monospace';
  ctx.fillStyle = td[0] === 'ALTA' ? '#7cd85a' : td[0] === 'BAIXA' ? '#ff7a5e' : '#cfd6dc';
  ctx.fillText(td[3] + ' ' + td[0] + (G.frenesi.ativa ? '  ⚡x' + CFG.FRENESI_MULT : ''), W / 2, 72);
  ctx.textAlign = 'left';

  // ícones utilitários (topo direito, grandes)
  iconeTopo(W - 50, mudo ? '🔇' : '🔊', alternarMudo);
  iconeTopo(W - 98, G.pausa ? '▶' : '⏸', () => { G.pausa = !G.pausa; });
  iconeTopo(W - 146, G.telaCheia ? '⊡' : '⛶', alternarTelaCheia);
  iconeTopo(W - 194, '?', () => { G.ajuda = true; G.ajudaPag = 0; });

  // ---------- LINHA 2: barras grandes ----------
  const y2 = 64, bh = 26;
  // meta / plantio
  ctx.font = '700 12px "Courier New", monospace'; ctx.fillStyle = '#9fb98a';
  ctx.fillText(colheita ? '🎯 META' : '🌱 PLANTIO', 14, y2 - 2);
  if (colheita) {
    barra(14, y2, 250, bh, G.vendidoHoje / G.meta, G.vendidoHoje >= G.meta ? '#7cd85a' : '#f0c814', false);
    ctx.fillStyle = '#eef2e0'; ctx.font = '700 14px "Courier New", monospace'; ctx.textAlign = 'center';
    ctx.fillText($(G.vendidoHoje) + ' / ' + $(G.meta), 139, y2 + 18); ctx.textAlign = 'left';
  } else {
    barra(14, y2, 250, bh, G.plantadasHoje / G.metaPlantio, '#7cd85a', false);
    ctx.fillStyle = '#eef2e0'; ctx.font = '700 14px "Courier New", monospace'; ctx.textAlign = 'center';
    ctx.fillText(G.plantadasHoje + ' / ' + G.metaPlantio + ' mudas', 139, y2 + 18); ctx.textAlign = 'left';
  }
  // diesel
  ctx.font = '700 12px "Courier New", monospace'; ctx.fillStyle = '#9fb98a';
  ctx.fillText('⛽', 286, y2 - 2);
  const fCom = jog.comb / uv('tanque');
  barra(310, y2, 150, bh, fCom, fCom > .5 ? '#59aa48' : fCom > .22 ? '#f0c814' : '#e04b3a', fCom <= .2);
  // saúde (pior componente)
  ctx.fillStyle = '#9fb98a'; ctx.fillText('🩺', 476, y2 - 2);
  const fS = worst / 100;
  barra(500, y2, 150, bh, fS, fS > .5 ? '#59aa48' : fS > .25 ? '#f0c814' : '#e04b3a', fS <= .2);
  if (worst <= 0) { ctx.fillStyle = '#ff5a4a'; ctx.font = '700 16px "Courier New", monospace'; ctx.fillText('✖', 566, y2 + 19); }
  // carga
  ctx.fillStyle = jog.cargaUn >= uv('cacamba') ? '#ff9a5e' : '#eef2e0';
  ctx.font = '700 20px "Courier New", monospace';
  ctx.fillText('📦 ' + jog.cargaUn + '/' + uv('cacamba'), 668, y2 + 14);
  ctx.font = '700 13px "Courier New", monospace'; ctx.fillStyle = '#ffe27a';
  ctx.fillText('~' + $(jog.cargaValor * G.tendencia[1] * (G.frenesi.ativa ? CFG.FRENESI_MULT : 1) * (G._mPreco || 1)), 668, y2 + 30);

  // ---------- CONTRATOS (texto grande, à esquerda) ----------
  const lista = listaContratos();
  ctx.font = '700 15px "Courier New", monospace';
  let cy = 118;
  for (const c of lista) {
    let prog;
    if (c.id === 'pacifista') prog = c.falhou ? '✗' : (c.feito ? '✓' : 'ok');
    else if (c.id === 'combo') prog = 'x' + c.prog.toFixed(1) + '/' + c.valorAlvo.toFixed(1) + (c.feito ? ' ✓' : '');
    else if (c.id === 'combustivel') prog = Math.floor(c.prog) + '/' + c.alvo + 'L' + (c.feito ? ' ✓' : '');
    else if (c.tempo) prog = c.feito ? '✓' : (c.falhou ? '✗' : '⏳');
    else prog = Math.min(Math.floor(c.prog), c.alvo) + '/' + c.alvo + (c.feito ? ' ✓' : '');
    const txt = '📜 ' + c.desc + '  ' + prog;
    const bonusTxt = '+' + $(Math.round(c.bonus * (G._mBonus || 1)));
    const tw = Math.min(ctx.measureText(txt).width + 90, W - 220);
    ctx.fillStyle = 'rgba(12,18,10,.85)'; ctx.fillRect(12, cy, tw, 24);
    ctx.strokeStyle = c.feito ? '#7cd85a' : c.falhou ? '#ff6a5e' : 'rgba(240,200,20,.5)';
    ctx.lineWidth = 1.5; ctx.strokeRect(12, cy, tw, 24);
    ctx.fillStyle = c.feito ? '#a9e88c' : c.falhou ? '#ff8f80' : '#eef2e0';
    ctx.fillText(txt, 20, cy + 17);
    ctx.fillStyle = '#ffd94d';
    ctx.fillText(bonusTxt, 20 + tw - 78, cy + 17);
    cy += 28;
  }
  if (lista.length >= 2 && lista.every(c => c.feito)) {
    ctx.fillStyle = '#ffd94d'; ctx.font = '700 14px "Courier New", monospace';
    ctx.fillText('🌟 todas cumpridas!', 16, cy + 14);
  }

  // ---------- EVENTO DO DIA (badge) ----------
  if (G.evento && G.evento.id !== 'normal' && !G.evento.id.endsWith('normal')) {
    const ev = G.evento;
    ctx.font = '700 14px "Courier New", monospace';
    const t2 = ev.icone + ' ' + ev.nome;
    const tw2 = ctx.measureText(t2).width + 20;
    const by2 = cy + 24;
    ctx.fillStyle = 'rgba(12,18,10,.85)'; ctx.fillRect(12, by2, tw2, 24);
    ctx.strokeStyle = ev.cor; ctx.lineWidth = 1.8; ctx.strokeRect(12, by2, tw2, 24);
    ctx.fillStyle = ev.cor; ctx.fillText(t2, 22, by2 + 17);
  }

  // ---------- RADAR (maior, topo direito) ----------
  { const rw = 184, rh = 128, rx = W - rw - 12, ry = 112;
    ctx.fillStyle = 'rgba(8,14,8,.85)'; ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeStyle = '#3c4a30'; ctx.lineWidth = 2; ctx.strokeRect(rx, ry, rw, rh);
    const sx = rw / MW, sy = rh / MH;
    ctx.fillStyle = '#2e6b7c';
    for (const L of LAGOAS) ctx.fillRect(rx + (L.x - L.rx) * sx, ry + (L.y - L.ry) * sy, Math.max(3, L.rx * 2 * sx), Math.max(2, L.ry * 2 * sy));
    ctx.fillStyle = '#274a1c';
    for (const a of ARVORES) ctx.fillRect(rx + a.x * sx - 1, ry + a.y * sy - 1, 3, 3);
    ctx.fillStyle = 'rgba(160,90,220,.9)';
    ctx.fillRect(rx + USINA.x * sx, ry + USINA.y * sy, USINA.w * sx, USINA.h * sy);
    ctx.fillStyle = 'rgba(240,200,20,.9)';
    ctx.fillRect(rx + USINA.zona.x * sx, ry + USINA.zona.y * sy, Math.max(2, USINA.zona.w * sx), Math.max(2, USINA.zona.h * sy));
    for (const c of canas) { ctx.fillStyle = c.prem ? '#ffd94d' : '#5fc046'; ctx.fillRect(rx + c.x * sx, ry + c.y * sy, 2, 2); }
    for (const pl of plantios) { ctx.fillStyle = '#a4e08c'; ctx.fillRect(rx + pl.x * sx, ry + pl.y * sy, 2, 2); }
    ctx.fillStyle = '#9aa0a8'; for (const pd of pedras) ctx.fillRect(rx + pd.x * sx - 1, ry + pd.y * sy - 1, 3, 3);
    ctx.fillStyle = '#b08050'; for (const cp of capis) ctx.fillRect(rx + cp.x * sx - 1, ry + cp.y * sy - 1, 3, 3);
    if (Math.floor(G.t * 5) % 2 === 0) { ctx.fillStyle = '#c86a2e'; for (const pr of pragas) ctx.fillRect(rx + pr.c.x * sx - 1, ry + pr.c.y * sy - 1, 3, 3); }
    if (Math.floor(G.t * 6) % 2 === 0) { ctx.fillStyle = '#ff5030'; for (const f of fogos) ctx.fillRect(rx + f.c.x * sx - 1, ry + f.c.y * sy - 1, 3, 3); }
    if (Math.floor(G.t * 4) % 2 === 0) { ctx.fillStyle = '#ffd94d'; for (const pc of pecas) ctx.fillRect(rx + pc.x * sx - 1, ry + pc.y * sy - 1, 3, 3); }
    const jx = rx + jog.x * sx, jy = ry + jog.y * sy;
    ctx.fillStyle = '#fff'; ctx.fillRect(jx - 2, jy - 2, 5, 5);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(jx, jy); ctx.lineTo(jx + Math.cos(jog.ang) * 9, jy + Math.sin(jog.ang) * 9); ctx.stroke();
  }
  // ticker da bolsa (sob o radar)
  { const tx = W - 196, ty2 = 246;
    ctx.font = '700 13px "Courier New", monospace'; ctx.fillStyle = '#eef2e0';
    ctx.fillText('CANA11 ' + $(G.bolsa.preco), tx, ty2);
    const vB = G.bolsa.var; ctx.fillStyle = vB >= 0 ? '#7cd85a' : '#ff7a5e';
    ctx.fillText((vB >= 0 ? '▲+' : '▼') + Math.round(vB * 100) + '%' + (G.bolsa.cotas > 0 ? '  💼' + G.bolsa.cotas : ''), tx + 118, ty2);
  }

  // ---------- TOASTS (centro) ----------
  let ty = 118; ctx.textAlign = 'center';
  for (const t of toasts) {
    const a = clamp(1 - Math.max(0, t.t - (t.dur - 0.5)) / 0.5, 0, 1);
    ctx.globalAlpha = a; ctx.font = '700 16px "Courier New", monospace';
    const tw = ctx.measureText(t.txt).width + 28;
    ctx.fillStyle = 'rgba(12,18,10,.9)'; ctx.fillRect(W / 2 - tw / 2, ty - 16, tw, 26);
    ctx.strokeStyle = 'rgba(240,200,20,.5)'; ctx.lineWidth = 1.5; ctx.strokeRect(W / 2 - tw / 2, ty - 16, tw, 26);
    ctx.fillStyle = '#eef2e0'; ctx.fillText(t.txt, W / 2, ty + 2); ty += 32;
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';

  // ---------- COMBO / TURBO (barra inferior central) ----------
  { const cx = 286, cyb = H - 34, cw = 232;
    ctx.font = '700 14px "Courier New", monospace';
    if (jog.turbo > 0) {
      ctx.fillStyle = Math.floor(G.t * 8) % 2 === 0 ? '#ff7b2e' : '#ffd94d'; ctx.textAlign = 'center';
      ctx.fillText('🔥 TURBO ' + jog.turbo.toFixed(1) + 's', cx + cw / 2, cyb - 6); ctx.textAlign = 'left';
      barra(cx, cyb, cw, 16, jog.turbo / CFG.TURBO_DUR, '#ff7b2e', false);
    } else if (colheita) {
      ctx.fillStyle = '#cfe0b8'; ctx.textAlign = 'center';
      ctx.fillText('COMBO x' + jog.combo.toFixed(1), cx + cw / 2, cyb - 6); ctx.textAlign = 'left';
      barra(cx, cyb, cw, 16, (jog.combo - 1) / (CFG.COMBO_MAX - 1), jog.combo > 3 ? '#ff9a3e' : '#7cd85a', jog.combo >= CFG.COMBO_MAX - 0.14);
    }
  }

  // ---------- D-PAD (grande, inferior esquerdo) ----------
  ctx.font = '700 30px "Courier New", monospace'; ctx.textAlign = 'center';
  for (const z of DPAD_ZONAS) {
    const on = dpad[z.id];
    ctx.fillStyle = on ? 'rgba(240,200,20,.55)' : 'rgba(20,28,16,.6)';
    ctx.fillRect(z.x, z.y, z.w, z.h);
    ctx.strokeStyle = on ? '#f0c814' : 'rgba(220,230,200,.6)'; ctx.lineWidth = 2.5;
    ctx.strokeRect(z.x, z.y, z.w, z.h);
    ctx.fillStyle = '#eef2e0'; ctx.fillText(z.rot, z.x + z.w / 2, z.y + z.h / 2 + 11);
  }
  ctx.textAlign = 'left';

  // ---------- BOTÕES DE AÇÃO (grade grande, inferior direito) ----------
  const acoes = [];
  if (colheita) {
    const descUsina = pertoDaUsina();
    acoes.push(['⛽', $((uv('tanque') - jog.comb) * CFG.PRECO_LITRO * (descUsina ? 0.5 : 1)), jog.comb < uv('tanque') - 0.5, '#8ecae6', abastecer]);
    acoes.push(['🔧', $((100 - jog.integ) * CFG.PRECO_REPARO), jog.integ < 99.5, '#8ecae6', consertar]);
    acoes.push(['📦', 'vender', jog.cargaUn > 0, '#ffd94d', venderDrone]);
    acoes.push(['🧪', $(CFG.DEFENSIVO_CUSTO), G.grana >= CFG.DEFENSIVO_CUSTO, '#7fd4a8', aplicarDefensivo]);
    if (fogos.length) acoes.push(['🚒', $(CFG.PRECO_BOMBEIRO), G.grana >= CFG.PRECO_BOMBEIRO, '#ff7a5e', bombeiro]);
    if (G.bolsa.cotas > 0) acoes.push(['📉', 'resgatar', true, '#e8c85e', resgatarBolsa]);
  } else {
    acoes.push(['🌱', G.mudaPremium ? 'prem' : 'normal', G.grana >= (G.mudaPremium ? CFG.MUDA_PREMIUM : CFG.MUDA_NORMAL), '#7cd85a', plantar]);
    acoes.push(['⭐', G.mudaPremium ? '3x' : 'troca', true, '#f0c814', () => { G.mudaPremium = !G.mudaPremium; toast(G.mudaPremium ? '⭐ muda PREMIUM (3x)' : '🌱 muda normal'); }]);
    acoes.push(['✔', 'encerrar', G.plantadasHoje >= G.metaPlantio, '#7cd85a', encerrarPlantio]);
    acoes.push(['🧪', $(CFG.DEFENSIVO_CUSTO), G.grana >= CFG.DEFENSIVO_CUSTO, '#7fd4a8', aplicarDefensivo]);
    if (G.bolsa.cotas > 0) acoes.push(['📉', 'resgatar', true, '#e8c85e', resgatarBolsa]);
  }
  const bs = 66, gap = 6, cols = 3;
  const gridW = cols * bs + (cols - 1) * gap;
  const bx0 = W - gridW - 12;
  acoes.forEach((a, i) => {
    const col = i % cols, row = (i / cols) | 0;
    const bxp = bx0 + col * (bs + gap);
    const byp = H - 12 - bs - row * (bs + gap);
    btnM(bxp, byp, bs, bs, a[0], a[1], a[2], a[3], a[4]);
  });
}

function desenharHUD() {
  if (G.fase === 'menu') return;

  const gTopo = ctx.createLinearGradient(0, 0, 0, 46);              // faixa superior

  ctx.fillStyle = gTopo; ctx.fillRect(0, 0, W, 46);

  ctx.fillStyle = 'rgba(240,200,20,.35)'; ctx.fillRect(0, 46, W, 1);

  { const p = 1 + (G._gPulso || 0) * 0.9;                           // grana com moeda
    ctx.fillStyle = '#8a6b00'; ctx.beginPath(); ctx.arc(23, 24, 9 * p, 0, 7); ctx.fill();
    ctx.fillStyle = '#ffd94d'; ctx.beginPath(); ctx.arc(22, 23, 9 * p, 0, 7); ctx.fill();
    ctx.fillStyle = '#8a6b00'; ctx.font = '700 13px "Courier New", monospace';
    ctx.fillText('$', 18.5, 27.5);
    ctx.save(); ctx.translate(38, 31); ctx.scale(p, p);
    ctx.font = '700 24px "Courier New", monospace'; ctx.fillStyle = '#ffd94d';
    ctx.fillText($(G.grana).slice(1), 0, 0);
    ctx.restore(); }

  ctx.font = '700 15px "Courier New", monospace';
  ctx.fillStyle = '#cfe0b8';
  ctx.fillText('DIA ' + G.dia, 158, 29);

  const tarde = G.hora >= 21 * 60;                                  // relógio
  ctx.fillStyle = tarde && Math.floor(G.t * 4) % 2 === 0 ? '#ff5a4a' : '#eef2e0';
  ctx.fillText(G.fase === 'plantio' ? '--:--' : hhmm(G.hora), 236, 29);

  const td = G.tendencia;                                           // tendência
  ctx.fillStyle = td[0] === 'ALTA' ? '#7cd85a' : td[0] === 'BAIXA' ? '#ff7a5e' : '#cfd6dc';
  ctx.fillText(td[3] + ' ' + td[0], 322, 24);
  if (G.frenesi.ativa) {
    ctx.fillStyle = Math.floor(G.t * 6) % 2 === 0 ? '#ffd94d' : '#ff8f3e';
    ctx.font = '700 12px "Courier New", monospace';
    ctx.fillText('⚡ FRENESI x' + CFG.FRENESI_MULT, 322, 40);
  }

  if (G.fase === 'colheita') {                                      // meta do dia
    ctx.font = '700 11px "Courier New", monospace';
    ctx.fillStyle = '#9fb98a'; ctx.fillText('META', 436, 16);
    barra(436, 20, 150, 14, G.vendidoHoje / G.meta, G.vendidoHoje >= G.meta ? '#7cd85a' : '#f0c814', false);
    ctx.fillStyle = '#eef2e0'; ctx.font = '700 11px "Courier New", monospace';
    ctx.fillText($(G.vendidoHoje) + ' / ' + $(G.meta), 440, 31);
  } else {
    ctx.font = '700 11px "Courier New", monospace';
    ctx.fillStyle = '#9fb98a'; ctx.fillText('PLANTIO', 436, 16);
    barra(436, 20, 150, 14, G.plantadasHoje / G.metaPlantio, '#7cd85a', false);
    ctx.fillStyle = '#eef2e0';
    ctx.fillText(G.plantadasHoje + ' / ' + G.metaPlantio + ' mudas', 440, 31);
  }

  ctx.font = '700 11px "Courier New", monospace';                   // diesel
  ctx.fillStyle = '#9fb98a'; ctx.fillText('⛽ DIESEL', 606, 16);
  const fCom = jog.comb / uv('tanque');
  barra(606, 20, 110, 14, fCom, fCom > .5 ? '#59aa48' : fCom > .22 ? '#f0c814' : '#e04b3a', fCom <= .2);

  ctx.fillStyle = '#9fb98a'; ctx.font = '700 10px "Courier New", monospace';
  ctx.fillText('🩺 SAÚDE', 726, 13);                                 // 4 componentes
  const compKeys = ['hidraulico', 'rodante', 'corte', 'motor'];
  compKeys.forEach((k, i) => {
    const f = jog.comp[k] / 100, bx2 = 726 + i * 27;
    barra(bx2, 18, 24, 15, f, f > .5 ? '#59aa48' : f > .25 ? '#f0c814' : '#e04b3a', f <= .2);
    ctx.fillStyle = '#cfe0b8'; ctx.font = '9px "Courier New", monospace';
    ctx.fillText(CFG.COMPONENTES[k].icone, bx2 + 4, 44);
  });

  ctx.fillStyle = '#9fb98a'; ctx.fillText('📦 CARGA', 844, 16);      // carga
  ctx.fillStyle = jog.cargaUn >= uv('cacamba') ? '#ff9a5e' : '#eef2e0';
  ctx.font = '700 13px "Courier New", monospace';
  ctx.fillText(jog.cargaUn + '/' + uv('cacamba'), 844, 31);
  ctx.font = '11px "Courier New", monospace'; ctx.fillStyle = '#ffe27a';
  ctx.fillText('~' + $(jog.cargaValor * G.tendencia[1] * (G.frenesi.ativa ? CFG.FRENESI_MULT : 1) * (G._mPreco || 1)), 844, 42);

  if (G.fase === 'colheita' || G.fase === 'plantio') {              // pilha de contratos
    const lista = listaContratos();
    ctx.font = '700 11px "Courier New", monospace';
    let cy = 52;
    for (const c of lista) {
      let prog;
      if (c.id === 'pacifista') prog = c.falhou ? '✗' : (c.feito ? '✓' : 'ok');
      else if (c.id === 'combo') prog = 'x' + c.prog.toFixed(1) + '/x' + c.valorAlvo.toFixed(1) + (c.feito ? ' ✓' : '');
      else if (c.id === 'combustivel') prog = Math.floor(c.prog) + '/' + c.alvo + 'L' + (c.feito ? ' ✓' : '');
      else if (c.tempo) prog = c.feito ? '✓' : (c.falhou ? '✗' : '⏳');
      else prog = Math.min(Math.floor(c.prog), c.alvo) + '/' + c.alvo + (c.feito ? ' ✓' : '');
      const txt = '📜 ' + c.desc + ' · ' + prog;
      const bonusTxt = '+' + $(Math.round(c.bonus * (G._mBonus || 1)));
      const tw = ctx.measureText(txt).width + ctx.measureText(bonusTxt).width + 26;
      ctx.fillStyle = 'rgba(12,18,10,.82)'; ctx.fillRect(10, cy, tw, 18);
      ctx.strokeStyle = c.feito ? '#7cd85a' : c.falhou ? '#ff6a5e' : 'rgba(240,200,20,.5)';
      ctx.lineWidth = 1.2; ctx.strokeRect(10, cy, tw, 18);
      ctx.fillStyle = c.feito ? '#a9e88c' : c.falhou ? '#ff8f80' : '#eef2e0';
      ctx.fillText(txt, 17, cy + 13);
      ctx.fillStyle = '#ffd94d';
      ctx.fillText(bonusTxt, 17 + ctx.measureText(txt).width + 8, cy + 13);
      cy += 21;
    }
    if (lista.length >= 2 && lista.every(c => c.feito)) {           // selo de tudo cumprido
      ctx.fillStyle = '#ffd94d'; ctx.font = '700 10px "Courier New", monospace';
      ctx.fillText('🌟 todas cumpridas!', 14, cy + 10);
    }
  }

  if ((G.fase === 'colheita' || G.fase === 'plantio') && G.evento && G.evento.id !== 'normal') {
    const ev = G.evento;                                            // badge do evento
    ctx.font = '700 11px "Courier New", monospace';
    const t2 = ev.icone + ' ' + ev.nome;
    const tw2 = ctx.measureText(t2).width + 18;
    const nC = ((G.fase === 'colheita' || G.fase === 'plantio') ? listaContratos().length : 0);
    const bx2 = W / 2 - tw2 / 2, by2 = 54 + nC * 21 + 6;
    ctx.fillStyle = 'rgba(12,18,10,.82)'; ctx.fillRect(bx2, by2, tw2, 20);
    ctx.strokeStyle = ev.cor; ctx.lineWidth = 1.5; ctx.strokeRect(bx2, by2, tw2, 20);
    ctx.fillStyle = ev.cor; ctx.textAlign = 'center';
    ctx.fillText(t2, W / 2, by2 + 14); ctx.textAlign = 'left';
  }

  { const cx0 = 606, cy0 = 38;                                       // 4 componentes
    const chaves = Object.keys(CFG.COMPONENTES);
    ctx.font = '9px "Courier New", monospace';
    chaves.forEach((k, i) => {
      const bx = cx0 + (i % 2) * 118, by2 = cy0 + ((i / 2) | 0) * 8;
      const f = jog.comp[k] / 100;
      ctx.fillStyle = '#8aa178';
      ctx.fillText(CFG.COMPONENTES[k].icone, bx - 2, by2 + 6);
      barra(bx + 14, by2, 98, 6, f, f > .5 ? '#59aa48' : f > .25 ? '#f0c814' : '#e04b3a', f <= .18 && f > 0);
      if (f <= 0) { ctx.fillStyle = '#ff5a4a'; ctx.fillText('✖', bx + 58, by2 + 6); }
    });
  }

  { // radar
    const rx = W - 158, ry = 54, rw = 146, rh = 110;
    ctx.fillStyle = 'rgba(8,14,8,.82)'; ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeStyle = '#3c4a30'; ctx.lineWidth = 2; ctx.strokeRect(rx, ry, rw, rh);
    const sx = rw / MW, sy = rh / MH;
    ctx.fillStyle = '#2e6b7c';
    for (const L of LAGOAS)
      ctx.fillRect(rx + (L.x - L.rx) * sx, ry + (L.y - L.ry) * sy,
                   Math.max(3, L.rx * 2 * sx), Math.max(2, L.ry * 2 * sy));
    ctx.fillStyle = '#274a1c';
    for (const a of ARVORES) ctx.fillRect(rx + a.x * sx - 1, ry + a.y * sy - 1, 3, 3);
    ctx.fillStyle = 'rgba(160,90,220,.9)';
    ctx.fillRect(rx + USINA.x * sx, ry + USINA.y * sy, USINA.w * sx, USINA.h * sy);
    ctx.fillStyle = 'rgba(240,200,20,.9)';
    ctx.fillRect(rx + USINA.zona.x * sx, ry + USINA.zona.y * sy, Math.max(2, USINA.zona.w * sx), Math.max(2, USINA.zona.h * sy));
    for (const c of canas) {
      ctx.fillStyle = c.prem ? '#ffd94d' : '#5fc046';
      ctx.fillRect(rx + c.x * sx, ry + c.y * sy, 2, 2);
    }
    for (const pl of plantios) { ctx.fillStyle = '#a4e08c'; ctx.fillRect(rx + pl.x * sx, ry + pl.y * sy, 2, 2); }
    ctx.fillStyle = '#9aa0a8';
    for (const p of pedras) ctx.fillRect(rx + p.x * sx - 1, ry + p.y * sy - 1, 3, 3);
    ctx.fillStyle = '#b08050';
    for (const cp of capis) ctx.fillRect(rx + cp.x * sx - 1, ry + cp.y * sy - 1, 3, 3);
    if (Math.floor(G.t * 4) % 2 === 0) {
      ctx.fillStyle = '#ffd94d';
      for (const pc of pecas) ctx.fillRect(rx + pc.x * sx - 1, ry + pc.y * sy - 1, 3, 3);
    }
    if (Math.floor(G.t * 5) % 2 === 0) {
      ctx.fillStyle = '#c86a2e';
      for (const p of pragas) ctx.fillRect(rx + p.c.x * sx - 1, ry + p.c.y * sy - 1, 3, 3);
    }
    if (Math.floor(G.t * 6) % 2 === 0) {
      ctx.fillStyle = '#ff5030';
      for (const f of fogos) ctx.fillRect(rx + f.c.x * sx - 1, ry + f.c.y * sy - 1, 3, 3);
    }
    const jx = rx + jog.x * sx, jy = ry + jog.y * sy;                // jogador

  }

  if (G.fase === 'colheita' || G.fase === 'plantio') {              // ticker da bolsa
    const tx = W - 158, ty2 = 172;
    ctx.fillStyle = 'rgba(8,14,8,.8)'; ctx.fillRect(tx, ty2, 146, 48);
    ctx.strokeStyle = '#3c4a30'; ctx.lineWidth = 2; ctx.strokeRect(tx, ty2, 146, 48);
    ctx.font = '700 12px "Courier New", monospace';
    ctx.fillStyle = '#eef2e0';
    ctx.fillText('CANA11  ' + $(G.bolsa.preco), tx + 8, ty2 + 15);
    const vB = G.bolsa.var;
    ctx.fillStyle = vB >= 0 ? '#7cd85a' : '#ff7a5e';
    ctx.font = '700 11px "Courier New", monospace';
    ctx.fillText((vB >= 0 ? '▲ +' : '▼ ') + Math.round(vB * 100) + '% hoje', tx + 8, ty2 + 30);
    ctx.fillStyle = G.bolsa.cotas > 0 ? '#ffd94d' : '#77826a';
    ctx.fillText(G.bolsa.cotas > 0
      ? '💼 ' + G.bolsa.cotas + '× = ' + $(bolsaValor())
      : '💼 sem posição', tx + 8, ty2 + 44);
  }

  { // combo / turbo
    const cx = 12, cy = H - 30;
    ctx.font = '700 12px "Courier New", monospace';
    if (jog.turbo > 0) {
      ctx.fillStyle = Math.floor(G.t * 8) % 2 === 0 ? '#ff7b2e' : '#ffd94d';
      ctx.fillText('🔥 TURBO ' + jog.turbo.toFixed(1) + 's', cx, cy - 4);
      barra(cx, cy, 180, 12, jog.turbo / CFG.TURBO_DUR, '#ff7b2e', false);
    } else if (G.fase === 'colheita') {
      ctx.fillStyle = '#cfe0b8';
      ctx.fillText('COMBO x' + jog.combo.toFixed(1), cx, cy - 4);
      barra(cx, cy, 180, 12, (jog.combo - 1) / (CFG.COMBO_MAX - 1),
            jog.combo > 3 ? '#ff9a3e' : '#7cd85a', jog.combo >= CFG.COMBO_MAX - 0.14);
    }
  }

  let ty = 58;                                                      // toasts
  ctx.textAlign = 'center';
  for (const t of toasts) {
    const a = clamp(1 - Math.max(0, t.t - (t.dur - 0.5)) / 0.5, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = '700 13px "Courier New", monospace';
    const tw = ctx.measureText(t.txt).width + 24;
    ctx.fillStyle = 'rgba(12,18,10,.85)';
    ctx.fillRect(W / 2 - tw / 2, ty - 14, tw, 21);
    ctx.strokeStyle = 'rgba(240,200,20,.5)'; ctx.strokeRect(W / 2 - tw / 2, ty - 14, tw, 21);
    ctx.fillStyle = '#eef2e0';
    ctx.fillText(t.txt, W / 2, ty + 1);
    ty += 26;
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';

  if (G.fase === 'colheita' || G.fase === 'plantio') {              // chips de ação
    let by = H - 44;
    const bx = W - 168, bw = 156, bh = 36;
    if (G.fase === 'plantio') {
      chip(bx, by, bw, bh, '✔ ENCERRAR  ⏎', G.plantadasHoje + '/' + G.metaPlantio + ' plantadas',
           G.plantadasHoje >= G.metaPlantio, encerrarPlantio); by -= 42;
      chip(bx, by, bw, bh, '🌱 PLANTAR  ␣', (G.mudaPremium ? 'premium ' + $(CFG.MUDA_PREMIUM) : 'normal ' + $(CFG.MUDA_NORMAL)),
           true, plantar); by -= 42;
      chip(bx, by, bw, bh, '⭐ TIPO  Q', G.mudaPremium ? '→ PREMIUM 3x' : '→ normal',
           true, () => { G.mudaPremium = !G.mudaPremium; toast(G.mudaPremium ? '⭐ muda PREMIUM (vale 3x)' : '🌱 muda normal'); }); by -= 42;
    }
    if (fogos.length) {
      chip(bx, by, bw, bh, '🚒 BOMBEIRO  4', $(CFG.PRECO_BOMBEIRO) + ' apaga tudo',
           G.grana >= CFG.PRECO_BOMBEIRO, bombeiro); by -= 42;
    }
    chip(bx, by, bw, bh, '🧪 DEFENSIVO  5',
         (G.fase === 'plantio' ? 'trata a área · ' : 'cura e protege · ') + $(CFG.DEFENSIVO_CUSTO),
         G.grana >= CFG.DEFENSIVO_CUSTO, aplicarDefensivo); by -= 42;
    if (G.bolsa.cotas > 0) {
      chip(bx, by, bw, bh, '📉 BOLSA  B', 'resgatar tudo (−10%)', true, resgatarBolsa); by -= 42;
    }
    chip(bx, by, bw, bh, '📦 VENDER  3', 'drone, frete −20%', jog.cargaUn > 0, venderDrone); by -= 42;
    if (G.fase === 'colheita') {
      chip(bx, by, bw, bh, '🔧 CONSERTO  2', $((100 - jog.integ) * CFG.PRECO_REPARO), jog.integ < 99.5, consertar); by -= 42;
    }
    const descUsina = pertoDaUsina();
    chip(bx, by, bw, bh, '⛽ DIESEL  1',
         $((uv('tanque') - jog.comb) * CFG.PRECO_LITRO * (descUsina ? 0.5 : 1)) + (descUsina ? ' 🏭−50%' : ''),
         jog.comb < uv('tanque') - 0.5, abastecer);
  }

  { // som + pausa (cliáveis)
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.fillStyle = '#cfe0b8';
    ctx.fillText(mudo ? '🔇' : '🔊', W - 30, 30);
    botoesTela.push({ x: W - 36, y: 8, w: 30, h: 30, cb: alternarMudo });
    if (G.fase === 'colheita' || G.fase === 'plantio') {
      ctx.fillText(G.pausa ? '▶' : '⏸', W - 60, 30);
      botoesTela.push({ x: W - 66, y: 8, w: 28, h: 30, cb: () => { G.pausa = !G.pausa; } });
    }
  }

  if (G.fase === 'colheita' || G.fase === 'plantio') {              // ⛶ e ? flutuantes
    const iy = TOQUE ? H - 196 : H - 68;
    const icones = [
      [G.telaCheia ? '⊡' : '⛶', alternarTelaCheia],
      ['?', () => { G.ajuda = true; G.ajudaPag = 0; }],
    ];
    ctx.textAlign = 'center';
    icones.forEach(([rot, cb], i) => {
      const ix = 12 + i * 38;
      ctx.fillStyle = 'rgba(18,26,14,.7)'; ctx.fillRect(ix, iy, 32, 32);
      ctx.strokeStyle = 'rgba(220,230,200,.5)'; ctx.lineWidth = 2;
      ctx.strokeRect(ix, iy, 32, 32);
      ctx.fillStyle = '#eef2e0'; ctx.font = '700 16px "Courier New", monospace';
      ctx.fillText(rot, ix + 16, iy + 22);
      botoesTela.push({ x: ix, y: iy, w: 32, h: 32, cb });
    });
    ctx.textAlign = 'left';
  }

  if (TOQUE && (G.fase === 'colheita' || G.fase === 'plantio')) {   // D-Pad virtual
    ctx.font = '700 20px "Courier New", monospace'; ctx.textAlign = 'center';
    for (const z of DPAD_ZONAS) {

      ctx.fillStyle = on ? 'rgba(240,200,20,.5)' : 'rgba(20,28,16,.55)';
      ctx.fillRect(z.x, z.y, z.w, z.h);
      ctx.strokeStyle = on ? '#f0c814' : 'rgba(220,230,200,.5)'; ctx.lineWidth = 2;
      ctx.strokeRect(z.x, z.y, z.w, z.h);
      ctx.fillStyle = '#eef2e0';
      ctx.fillText(z.rot, z.x + z.w / 2, z.y + z.h / 2 + 7);
    }
    ctx.textAlign = 'left';
  }
}

/* ═══════════════════════════════════════════════ telas de fase ════ */
function painel(wp, hp) {
  const x = (W - wp) / 2, y = (H - hp) / 2;
  ctx.fillStyle = 'rgba(10,16,8,.93)';
  ctx.fillRect(x, y, wp, hp);
  ctx.strokeStyle = '#f0c814'; ctx.lineWidth = 3;
  ctx.strokeRect(x, y, wp, hp);
  ctx.strokeStyle = '#3c4a30'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 5, y + 5, wp - 10, hp - 10);
  return { x, y };
}

function meuResultado() {
  return {
    v: 1, s: (G.duelo ? G.duelo.semente : 0), d: G.diasCampanha,
    n: (G.nomeJogador || 'OPERADOR').slice(0, 12),
    g: Math.floor(G.grana + bolsaValor()),
    dd: G.diasFinal || 0, c: G.stats.cortes || 0,
    w: (G.fimMotivo === 'vitoria') ? 1 : 0,
  };
}
function criarDesafio() {
  const inp = document.getElementById('nome');
  if (inp) { G.nomeJogador = ((inp.value || '').trim().toUpperCase().slice(0, 12)) || 'OPERADOR';
             try { localStorage.setItem(CFG.CHAVE_NOME, G.nomeJogador); } catch (e) {} }
  G.duelo = { semente: (Math.random() * 1e9) | 0, dias: G.diasCampanha, oponente: null };
  iniciarJogo();
  toast('🏆 DESAFIO CRIADO! Jogue e, no fim, envie seu código ao amigo.', 4.5);
}
function entrarDesafio() {
  const inp = document.getElementById('nome');
  if (inp) { G.nomeJogador = ((inp.value || '').trim().toUpperCase().slice(0, 12)) || 'OPERADOR';
             try { localStorage.setItem(CFG.CHAVE_NOME, G.nomeJogador); } catch (e) {} }
  const code = (typeof prompt === 'function') ? prompt('Cole aqui o código do desafio do seu amigo:') : '';
  const o = lerCodigo(code);
  if (!o || o.s == null) { toast('❌ Código inválido ou vazio.'); SFX.multa(); return; }
  G.duelo = { semente: o.s, dias: o.d || 2,
              oponente: { n: o.n || 'RIVAL', g: o.g || 0, dd: o.dd || 0, c: o.c || 0, w: o.w || 0 } };
  G.diasCampanha = clamp(o.d || 2, 1, CFG.DIAS_MAX);
  iniciarJogo();
  toast('⚔️ DUELO vs ' + (o.n || 'RIVAL') + '! Mesma safra dele — bata os ' + $(o.g || 0) + '!', 5);
}
function compartilharCodigo() {
  const r = meuResultado(), code = fazerCodigo(r);
  const msg = 'Te desafio no CANA TYCOON! 🚜 Minha safra rendeu ' + $(r.g) +
              ' em ' + r.dd + ' dia(s). Jogue a MESMA safra e me supere — ' +
              'cole este codigo no jogo (menu -> ENTRAR COM CODIGO): ' + code;
  if (typeof navigator !== 'undefined' && navigator.share) {
    navigator.share({ text: msg }).catch(() => {});
  } else if (typeof navigator !== 'undefined' && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code)
      .then(() => toast('📋 Código copiado! Cole no WhatsApp para o amigo.', 3.5))
      .catch(() => { if (typeof prompt === 'function') prompt('Copie o código do desafio:', code); });
  } else if (typeof prompt === 'function') {
    prompt('Copie o código do desafio:', code);
  }
}

  chaves.forEach((k, i) => {
    const co = CFG.COMPONENTES[k], ly = 100 + i * 74, lx = 40;
    const dano = 100 - jog.comp[k], f = jog.comp[k] / 100;
    ctx.fillStyle = 'rgba(16,24,12,.7)'; ctx.fillRect(lx, ly, W - 80, 66);
    ctx.strokeStyle = jog.comp[k] <= 0 ? '#e04b3a' : '#2c3a22'; ctx.lineWidth = 2;

    ctx.fillText(co.icone + ' ' + co.nome, lx + 14, ly + 22);
    barra(lx + 14, ly + 30, 240, 12, f, f > .5 ? '#59aa48' : f > .25 ? '#f0c814' : '#e04b3a', false);
    ctx.font = '700 11px "Courier New", monospace';
    ctx.fillStyle = dano > 0.5 ? '#ffb35e' : '#7cd85a';
    ctx.fillText(dano > 0.5 ? Math.round(dano) + ' pts de dano' : 'OK · 100%', lx + 264, ly + 40);

    const mi = R.mec[k];
    if (mi >= 0) {
      const M = CFG.MECANICOS[mi], est = estimativa(k);
      if (AVA[mi]) {
        ctx.drawImage(AVA[mi], lx + 398, ly + 8, 48, 48);
        ctx.strokeStyle = '#3c4a30'; ctx.lineWidth = 1;
        ctx.strokeRect(lx + 398, ly + 8, 48, 48);
      }
      ctx.font = '700 13px "Courier New", monospace'; ctx.fillStyle = '#ffd94d';
      ctx.fillText(M[0], lx + 454, ly + 20);
      ctx.font = '10px "Courier New", monospace'; ctx.fillStyle = '#c2ceac';
      ctx.fillText(estrelas(M[1]) + '  $' + M[2] + '/h', lx + 454, ly + 34);
      ctx.fillStyle = '#9fbf8a';
      ctx.fillText((est && est.min > 0 && !R.rodando) ? '~' + fmtH(est.min) + ' · ' + $(est.custo)
                                                       : '"' + M[3] + '"', lx + 454, ly + 48);
    } else if (dano > 0.5) {
      ctx.font = '11px "Courier New", monospace'; ctx.fillStyle = '#77826a';
      ctx.fillText('sem mecânico designado', lx + 400, ly + 30);
    }
    if (!R.rodando && dano > 0.5)
      chip(W - 210, ly + 16, 150, 34, mi < 0 ? 'CONTRATAR ▸' : 'TROCAR ▸',
           null, true, () => atribuirMec(k));
    if (R.rodando && R.fim[k] > 0) {
      ctx.fillStyle = '#ffd94d'; ctx.font = '700 11px "Courier New", monospace';
      ctx.fillText('reparando… ' + fmtH(R.fim[k]), W - 205, ly + 40);
    }
  });

  const py = 100 + 4 * 74 + 6;
  if (!R.rodando) {
    let orc = 0, algum = false;
    for (const k in R.mec) { const e = R.mec[k] >= 0 ? estimativa(k) : null; if (e && e.min > 0) { orc += e.custo; algum = true; } }
    ctx.font = '700 14px "Courier New", monospace'; ctx.fillStyle = '#cfe0b8';
    ctx.fillText('💰 ' + $(G.grana), 40, py + 22);

    ctx.font = '700 13px "Courier New", monospace'; ctx.fillStyle = '#9fbf8a';
    ctx.textAlign = 'center';
    ctx.fillText('⚙️ Equipe trabalhando… ' + fmtH(R.minPassados) + ' de serviço', W / 2, py + 22);
    ctx.textAlign = 'left';
  }
  const pronto = !R.rodando && Object.values(jog.comp).every(v => v > 0);
  if (pronto) {
    if (R.volta === 'plantio' || R.motivo === 'noite')

  }
}

function pagAjuda(d) {
  const n = AJUDA_PAGS.length;
  G.ajudaPag = (((G.ajudaPag || 0) + d) % n + n) % n;
}
function desenharAjuda() {
  botoesTela.length = 0;                            // manual captura os toques
  ctx.fillStyle = 'rgba(8,12,6,.8)'; ctx.fillRect(0, 0, W, H);
  const { x, y } = painel(700, 470);
  const pg = AJUDA_PAGS[(G.ajudaPag || 0) % AJUDA_PAGS.length];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd94d'; ctx.font = '700 20px "Courier New", monospace';
  ctx.fillText('📖 MANUAL DO OPERADOR', W / 2, y + 34);
  ctx.fillStyle = '#eef2e0'; ctx.font = '700 15px "Courier New", monospace';
  ctx.fillText(pg.t, W / 2, y + 62);
  AJUDA_PAGS.forEach((p, i) => {                    // bolinhas das páginas
    ctx.fillStyle = i === (G.ajudaPag || 0) ? '#ffd94d' : '#4a5540';
    ctx.beginPath();
    ctx.arc(W / 2 - (AJUDA_PAGS.length - 1) * 9 + i * 18, y + 80, 4, 0, 7);
    ctx.fill();
  });
  ctx.textAlign = 'left';
  ctx.fillStyle = '#dfe8d2'; ctx.font = '13px "Courier New", monospace';
  pg.l.forEach((l, i) => ctx.fillText(l, x + 42, y + 110 + i * 24));
  chip(x + 26, y + 412, 118, 36, '◀  A', null, true, () => pagAjuda(-1));
  chip(x + 556, y + 412, 118, 36, 'D  ▶', null, true, () => pagAjuda(1));
  chip(x + 288, y + 412, 124, 36, '✕ FECHAR  H', null, true, () => { G.ajuda = false; });
  ctx.fillStyle = '#9fbf8a'; ctx.font = '11px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('página ' + ((G.ajudaPag || 0) + 1) + '/' + AJUDA_PAGS.length +
               ' · toque na tela ou use A/D para navegar', W / 2, y + 464);
  ctx.textAlign = 'left';
}

    ctx.fillText('⚔️  DUELO DE SAFRA', W / 2, sy + 150);
    if (op) {
      const venci = patr > op.g, empate = patr === op.g;

      ctx.fillStyle = venci ? '#7cd85a' : '#cfe0b8';

      ctx.font = '700 24px "Courier New", monospace'; ctx.fillStyle = venci ? '#ffd94d' : '#eef2e0';

      ctx.fillStyle = (!venci && !empate) ? '#7cd85a' : '#cfe0b8'; ctx.font = '700 13px "Courier New", monospace';
      ctx.fillText(op.n.slice(0, 12), ox, sy + 178);
      ctx.font = '700 24px "Courier New", monospace'; ctx.fillStyle = (!venci && !empate) ? '#ffd94d' : '#eef2e0';
      ctx.fillText($(op.g), ox, sy + 204);
      ctx.fillStyle = '#ff8f3e'; ctx.font = '700 16px "Courier New", monospace';
      ctx.fillText('VS', W / 2, sy + 196);
      const pulse = 1 + Math.sin(G.t * 5) * 0.05;
      ctx.save(); ctx.translate(W / 2, sy + 240); ctx.scale(pulse, pulse);
      ctx.font = '700 22px "Courier New", monospace';
      ctx.fillStyle = venci ? '#ffd94d' : empate ? '#cfe0b8' : '#ff7a5e';
      ctx.fillText(venci ? '🏆 VOCÊ VENCEU!' : empate ? '🤝 EMPATE!' : '😤 VOCÊ PERDEU', 0, 0);

      ctx.font = '11px "Courier New", monospace'; ctx.fillStyle = '#9fbf8a';
      ctx.fillText('patrimônio final na mesma safra · você ' + (G.diasFinal||0) + 'd × ' + (op.dd||0) + 'd rival', W / 2, sy + 262);
    } else {
      ctx.fillStyle = '#eef2e0'; ctx.font = '700 14px "Courier New", monospace';
      ctx.fillText('Seu desafio está pronto! 🎉', W / 2, sy + 186);
      ctx.fillStyle = '#9fbf8a'; ctx.font = '12px "Courier New", monospace';
      ctx.fillText('Envie o código abaixo — o amigo joga a MESMA safra', W / 2, sy + 208);
      ctx.fillText('e tenta superar o seu ' + $(patr) + '.', W / 2, sy + 226);
    }
    if (G.fimT > 0.5) {
      chip(W / 2 - 302, y + 440, 296, 34, '📤 ENVIAR MEU CÓDIGO', 'compartilhar / responder', true, compartilharCodigo);
      chip(W / 2 + 6, y + 440, 296, 34, '🔄 VOLTAR AO MENU', null, true, () => { G.duelo = null; G.fase = 'menu'; });

  ctx.fillText('🏅 RANKING', col1, sy + 148);
  const rank = G._rank || [];
  ctx.font = '12px "Courier New", monospace';
  rank.slice(0, 6).forEach((e, i) => {
    const ry = sy + 168 + i * 20, meu = e.t === G._rankT;
    ctx.fillStyle = meu ? '#ffd94d' : '#cfe0b8';
    const pos = (i + 1) + 'º';
    const tag = e.v ? '🏆' : '  ';
    ctx.fillText(pos.padEnd(4) + tag + ' ' + e.n.padEnd(13).slice(0, 13), col1, ry);
    ctx.fillText(e.d + 'd', x + 360, ry);
    ctx.fillText($(e.p), x + 420, ry);
    if (meu) { ctx.fillStyle = '#ffd94d'; ctx.fillText('◀ você', x + 540, ry); }
  });
  if (!rank.length) {
    ctx.fillStyle = '#77826a'; ctx.fillText('sem registros ainda', col1, sy + 170);
  }

  ctx.textAlign = 'center';
  if (G.novoRec) {
    ctx.fillStyle = '#ffd94d'; ctx.font = '700 14px "Courier New", monospace';
    ctx.fillText('✨ NOVO RECORDE PESSOAL! ✨', W / 2, y + 452);
  }
  if (G.fimT > 0.6) {
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(G.t * 4);
    ctx.fillStyle = '#eef2e0'; ctx.font = '700 13px "Courier New", monospace';
    ctx.fillText('ENTER, ESPAÇO ou TOQUE para uma nova campanha', W / 2, y + 470);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';
}

const kb = { fwd: false, re: false, esq: false, dir: false };
const ptrs = new Map();
const DPAD_ZONAS = MOBILE ? [
  { id: 'fwd', rot: '▲', x: 104, y: H - 226, w: 92, h: 84 },
  { id: 're',  rot: '▼', x: 104, y: H - 100, w: 92, h: 84 },
  { id: 'esq', rot: '◀', x: 12,  y: H - 172, w: 88, h: 88 },
  { id: 'dir', rot: '▶', x: 200, y: H - 172, w: 88, h: 88 },
] : [
  { id: 'fwd', rot: '▲', x: 66,  y: H - 148, w: 52, h: 48 },
  { id: 're',  rot: '▼', x: 66,  y: H - 46,  w: 52, h: 46 },
  { id: 'esq', rot: '◀', x: 12,  y: H - 98,  w: 52, h: 50 },
  { id: 'dir', rot: '▶', x: 120, y: H - 98,  w: 52, h: 50 },
];
function sincDpad() {
  const t = { fwd: false, re: false, esq: false, dir: false };
  for (const z of ptrs.values()) if (z) t[z] = true;
  dpad.fwd = kb.fwd || t.fwd; dpad.re = kb.re || t.re;
  dpad.esq = kb.esq || t.esq; dpad.dir = kb.dir || t.dir;
}
function zonaEm(x, y) {
  for (const z of DPAD_ZONAS)
    if (x >= z.x - 6 && x <= z.x + z.w + 6 && y >= z.y - 6 && y <= z.y + z.h + 6) return z.id;
  return null;
}
function xyLogico(e) {
  const r = canvas.getBoundingClientRect();
  return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
}

window.addEventListener('keydown', e => {
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
  auInit();
  if (e.repeat) return;
  if (G.ajuda) {                                    // manual aberto: navega
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { pagAjuda(-1); return; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { pagAjuda(1); return; }
    if (e.code === 'KeyH' || e.code === 'Escape' || e.code === 'Space') { G.ajuda = false; return; }
    if (e.code === 'KeyF') { alternarTelaCheia(); return; }
    return;
  }
  if (G.fase === 'menu') {                          // no menu, setas escolhem os dias
    if (e.code === 'ArrowLeft') { G.diasCampanha = Math.max(1, G.diasCampanha - 1); return; }
    if (e.code === 'ArrowRight') { G.diasCampanha = Math.min(CFG.DIAS_MAX, G.diasCampanha + 1); return; }
  }
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': kb.fwd = true; break;
    case 'KeyS': case 'ArrowDown': kb.re = true; break;
    case 'KeyA': case 'ArrowLeft': kb.esq = true; break;
    case 'KeyD': case 'ArrowRight': kb.dir = true; break;
    case 'Space':
      if (G.fase === 'menu') iniciarJogo();
      else if (G.fase === 'fim' && G.fimT > 0.6 && !G.duelo) iniciarJogo();
      else if (G.fase === 'plantio') plantar();
      else if (G.fase === 'reforma') {
        const R = G.reforma, pronto = R && !R.rodando && Object.values(jog.comp).every(v => v > 0);
        if (pronto) { (R.volta === 'plantio' || R.motivo === 'noite') ? irOficina() : voltarAoCampo(); }
      }
      break;
    case 'Enter':
      if (G.fase === 'fim' && G.fimT > 0.6 && !G.duelo) iniciarJogo();
      else if (G.fase === 'oficina') irPlantio();
      else if (G.fase === 'reforma') {
        const R = G.reforma, pronto = R && !R.rodando && Object.values(jog.comp).every(v => v > 0);
        if (pronto) { (R.volta === 'plantio' || R.motivo === 'noite') ? irOficina() : voltarAoCampo(); }
        else iniciarReparos();
      }
      break;
    case 'Digit1': if (G.fase === 'colheita' || G.fase === 'plantio') abastecer(); break;
    case 'Digit2': if (G.fase === 'colheita' || G.fase === 'plantio') consertar(); break;
    case 'Digit3': if (G.fase === 'colheita' || G.fase === 'plantio') venderDrone(); break;
    case 'Digit4': if (G.fase === 'colheita') bombeiro(); break;
    case 'Digit5': if (G.fase === 'colheita' || G.fase === 'plantio') aplicarDefensivo(); break;
    case 'KeyB': if (G.fase === 'colheita' || G.fase === 'plantio') resgatarBolsa(); break;
    case 'KeyQ':
      if (G.fase === 'plantio') {
        G.mudaPremium = !G.mudaPremium;
        toast(G.mudaPremium ? '⭐ muda PREMIUM (vale 3x)' : '🌱 muda normal');
      }
      break;
    case 'KeyP':
      if (G.fase === 'colheita' || G.fase === 'plantio') G.pausa = !G.pausa;
      break;
    case 'KeyM': alternarMudo(); break;
    case 'KeyH': G.ajuda = true; G.ajudaPag = 0; break;
    case 'KeyF': alternarTelaCheia(); break;
  }
  sincDpad();
});
window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp': kb.fwd = false; break;
    case 'KeyS': case 'ArrowDown': kb.re = false; break;
    case 'KeyA': case 'ArrowLeft': kb.esq = false; break;
    case 'KeyD': case 'ArrowRight': kb.dir = false; break;
  }
  sincDpad();
});

canvas.addEventListener('pointerdown', e => {
  e.preventDefault(); auInit();
  const [x, y] = xyLogico(e);
  for (let i = botoesTela.length - 1; i >= 0; i--) {                // botões primeiro
    const b = botoesTela[i];
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { b.cb(); return; }
  }
  if (G.ajuda) { pagAjuda(1); return; }
  if (TOQUE) {
    const z = zonaEm(x, y);
    if (z && (G.fase === 'colheita' || G.fase === 'plantio')) {
      ptrs.set(e.pointerId, z); sincDpad(); return;
    }
  }
  if (G.fase === 'menu') { iniciarJogo(); return; }
  if (G.fase === 'fim' && G.fimT > 0.6 && !G.duelo) { iniciarJogo(); return; }
  if (G.fase === 'plantio' && TOQUE) plantar();
});
canvas.addEventListener('pointermove', e => {
  if (!ptrs.has(e.pointerId)) return;
  const [x, y] = xyLogico(e);
  ptrs.set(e.pointerId, zonaEm(x, y));
  sincDpad();
});
function soltarPtr(e) { if (ptrs.delete(e.pointerId)) sincDpad(); }
canvas.addEventListener('pointerup', soltarPtr);
canvas.addEventListener('pointercancel', soltarPtr);
window.addEventListener('blur', () => {
  if (G.fase === 'colheita' || G.fase === 'plantio') G.pausa = true;
  kb.fwd = kb.re = kb.esq = kb.dir = false; ptrs.clear(); sincDpad();
});
